<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>AXP | OPERATIONAL INSIGHTS</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    /* Page-specific stats refinements */
    .funnel-stack {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
      position: relative;
    }
    
    .funnel-node {
      background: var(--bg-surface);
      border: 1px solid var(--bd-subtle);
      border-radius: var(--r-lg);
      padding: 1.5rem;
      text-align: center;
      position: relative;
      transition: all 0.3s var(--ease);
    }
    .funnel-node:hover {
      border-color: var(--violet-border);
      background: rgba(168, 85, 247, 0.05);
    }

    .funnel-node::after {
      content: '▲';
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%) rotate(180deg);
      color: var(--violet);
      font-size: 0.8rem;
      opacity: 0.3;
      text-shadow: 0 0 10px var(--violet);
    }
    .funnel-node:last-child::after { display: none; }

    .performance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .performance-row:last-child { border: none; }
    .performance-label { font-size: 0.65rem; font-weight: 800; color: var(--tx-muted); letter-spacing: 0.1em; }
    .performance-val { font-family: var(--font-mono); font-weight: 900; color: var(--tx-hero); font-size: 0.9rem; }

    .density-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }
    .density-label { flex: 0 0 80px; font-weight: 800; font-size: 0.7rem; color: var(--tx-hero); }
    .density-track { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .density-bar { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--violet)); border-radius: 3px; transition: width 1.2s var(--ease); }
    .density-val { width: 30px; text-align: right; font-size: 0.65rem; font-weight: 800; color: var(--cyan); font-family: var(--font-mono); }
  </style>
</head>
<body class="page-vendor">

  <!-- Fixed Header -->
  <header class="page-header">
    <div class="ph-logo">AXP_ANALYTICS</div>
    <div class="ph-title">Intelligence Matrix</div>
    <div style="width:70px"></div>
  </header>

  <div class="page-wrap anim-stagger-in">
    
    <!-- Component: Performance Overview -->
    <div class="card mb-3 anim-up">
      <div class="section-header mb-2">
        <div>
          <div class="section-eyebrow">Operational Metrics</div>
          <h2 class="section-title">PERFORMANCE_OVERVIEW</h2>
        </div>
      </div>
      <div id="overviewStats" class="flex flex-col">
        <div class="skeleton-h sm w-full mb-1"></div>
        <div class="skeleton-h sm w-full" style="width:70%"></div>
      </div>
    </div>

    <!-- Component: Neural Density Map -->
    <div class="card mb-3 anim-up">
      <div class="section-header mb-2">
        <div>
          <div class="section-eyebrow">Geoproximal Density</div>
          <h2 class="section-title">REGIONAL_HEATMAP</h2>
        </div>
      </div>
      <div id="regionGrid" class="flex flex-col">
        <div class="skeleton-h sm w-full mb-1"></div>
        <div class="skeleton-h sm w-full"></div>
      </div>
    </div>

    <!-- Component: Operational Funnel -->
    <div class="anim-up">
      <div class="section-header mb-1">
        <div>
          <div class="section-eyebrow">Conversion Lifecycle</div>
          <h2 class="section-title">OPERATIONAL_FUNNEL</h2>
        </div>
      </div>
      <div class="funnel-stack" id="funnelContainer">
        <div class="funnel-node">
          <div class="skeleton-h md w-1/3 mx-auto mb-1"></div>
          <div class="skeleton-h sm w-1/2 mx-auto"></div>
        </div>
        <div class="funnel-node">
          <div class="skeleton-h md w-1/3 mx-auto mb-1"></div>
          <div class="skeleton-h sm w-1/2 mx-auto"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Universal Navigation -->
  <nav class="xp-nav">
    <a href="vendor_data.html" class="xp-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
      <span class="xp-nav-label">Data</span>
    </a>
    <a href="vendor_dashboard.html" class="xp-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span class="xp-nav-label">Hub</span>
    </a>
    <a href="vendor_stats.html" class="xp-nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
      <span class="xp-nav-label">Stats</span>
    </a>
    <a href="vendor_settings.html" class="xp-nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></svg>
      <span class="xp-nav-label">Elite</span>
    </a>
  </nav>

  <script src="nexus-auth.js"></script>
  <script src="translations.js"></script>
  <script src="notifications.js"></script>
  <script src="theme-manager.js"></script>
  <script>
    async function loadStats() {
      try {
        const res = await NexusAuth.fetch('/api/vault/vendor/insights');
        if (!res.ok) throw new Error('UPLINK_DENIED');
        const data = await res.json();

        // Overview stats
        const overviewEl = document.getElementById('overviewStats');
        const convPct = data.feedback_conversion_pct ?? 0;
        overviewEl.innerHTML = `
          <div class="performance-row">
            <span class="performance-label">REGISTERED_PROFILES</span>
            <span class="performance-val">${data.total_profiles ?? 0}</span>
          </div>
          <div class="performance-row">
            <span class="performance-label">TOTAL_UPLINK_HITS</span>
            <span class="performance-val">${(data.total_views ?? 0).toLocaleString()}</span>
          </div>
          <div class="performance-row">
            <span class="performance-label">FEEDBACK_RECEPTIONS</span>
            <span class="performance-val">${data.total_feedback ?? 0}</span>
          </div>
          <div class="performance-row">
            <span class="performance-label">CORE_CONVERSION_RATE</span>
            <span class="performance-val" style="color: var(--cyan);">${convPct}%</span>
          </div>
        `;

        // Regions
        const regionEl = document.getElementById('regionGrid');
        if (data.top_regions && data.top_regions.length > 0) {
          const maxCount = Math.max(...data.top_regions.map(r => r.count), 1);
          regionEl.innerHTML = data.top_regions.map(r => `
            <div class="density-row">
              <span class="density-label">${(r.region || 'UNKNOWN').toUpperCase().slice(0, 12)}</span>
              <div class="density-track">
                <div class="density-bar" style="width: ${Math.round((r.count / maxCount) * 100)}%"></div>
              </div>
              <span class="density-val">${r.count}</span>
            </div>
          `).join('');
        } else {
          regionEl.innerHTML = '<div style="padding:1.5rem;text-align:center;color:var(--tx-muted);font-size:0.7rem;">NO_GEODATA_IN_BUFFER</div>';
        }

        // Funnel
        const funnelEl = document.getElementById('funnelContainer');
        funnelEl.innerHTML = `
          <div class="funnel-node">
            <div class="text-xl font-black text-white mb-1">${(data.total_profiles ?? 0).toLocaleString()}</div>
            <div class="section-eyebrow">COMMANDS_ISSUED</div>
          </div>
          <div class="funnel-node">
            <div class="text-xl font-black text-cyan mb-1">${(data.total_views ?? 0).toLocaleString()}</div>
            <div class="section-eyebrow">NEURAL_UPLINKS</div>
          </div>
          <div class="funnel-node">
            <div class="text-xl font-black text-violet mb-1">${(data.total_feedback ?? 0).toLocaleString()}</div>
            <div class="section-eyebrow">FEEDBACK_SYNCED</div>
          </div>
        `;

      } catch (err) {
        console.error('STATS_LOAD_ERR:', err);
        ['overviewStats', 'regionGrid', 'funnelContainer'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--error);font-size:0.7rem;font-family:var(--font-mono);">DATA_STREAM_ERR:404</div>';
        });
      }
    }

    document.addEventListener('DOMContentLoaded', loadStats);
  </script>
</body>
</html>
