<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>AXP | GLOBAL STATS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor_shared.css">
    <link rel="stylesheet" href="vendor_nav.css">
    <style>
        .heatmap-grid {
            display: grid;
            gap: 1rem;
        }
        .region-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }
        .region-name { flex: 1; font-weight: 800; font-size: 0.8rem; }
        .region-bar-container { flex: 2; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .region-bar { height: 100%; background: var(--accent-primary); border-radius: 10px; }
        .region-val { width: 40px; text-align: right; font-size: 0.75rem; font-weight: 900; color: white; }

        .funnel-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .funnel-step {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            position: relative;
        }
        .funnel-step::after {
            content: '↓';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent-primary);
            font-size: 1.2rem;
            font-weight: 900;
        }
        .funnel-step:last-child::after { display: none; }
        .funnel-val { font-size: 1.5rem; font-weight: 900; color: var(--accent-primary); display: block; }
        .funnel-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <h2 class="section-title">REGIONAL HEATMAP</h2>
            <div class="heatmap-grid" style="margin-top: 1.5rem;">
                <div class="region-row">
                    <span class="region-name">LATAM</span>
                    <div class="region-bar-container"><div class="region-bar" style="width: 85%;"></div></div>
                    <span class="region-val">85%</span>
                </div>
                <div class="region-row">
                    <span class="region-name">MENA</span>
                    <div class="region-bar-container"><div class="region-bar" style="width: 62%;"></div></div>
                    <span class="region-val">62%</span>
                </div>
                <div class="region-row">
                    <span class="region-name">EUROPE</span>
                    <div class="region-bar-container"><div class="region-bar" style="width: 45%;"></div></div>
                    <span class="region-val">45%</span>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <h2 class="section-title">CONVERSION FUNNEL</h2>
            <div class="funnel-container">
                <div class="funnel-step">
                    <span class="funnel-val">42.5K</span>
                    <span class="funnel-label">CODES GENERATED</span>
                </div>
                <div class="funnel-step">
                    <span class="funnel-val">31.2K</span>
                    <span class="funnel-label">TOTAL HITS</span>
                </div>
                <div class="funnel-step">
                    <span class="funnel-val">12.8K</span>
                    <span class="funnel-label">EVENT ENTRIES</span>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor_layout.js"></script>
    <script src="vendor_logic.js"></script>
</body>
</html>
