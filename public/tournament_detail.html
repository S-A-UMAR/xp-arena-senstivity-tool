<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XP ARENA | Scrim Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-primary: #00f0ff;
            --accent-secondary: #7000ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding-top: 90px;
            padding-bottom: 100px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(112, 0, 255, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 75px;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            z-index: 5000;
        }

        .user-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 75px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(24px);
            border-top: 1px solid var(--glass-border);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-item.active { color: var(--accent-primary); }
        .nav-item svg { width: 20px; height: 20px; }
        .nav-label { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.05em; }

        .detail-container { max-width: 600px; margin: 0 auto; padding: 0 1.25rem; }

        .hero-panel {
            background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-panel::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-secondary), transparent);
        }

        .countdown {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-primary);
            margin: 1.5rem 0;
            letter-spacing: -0.05em;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 24px;
            text-align: center;
        }

        .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 6px; font-weight: 800; }
        .stat-value { font-size: 1.25rem; font-weight: 800; font-family: 'JetBrains Mono'; }

        .participants-table {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .table-header {
            background: rgba(255,255,255,0.04);
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            font-weight: 900;
            font-size: 0.7rem;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .participant-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.1rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .participant-row:hover { background: rgba(255,255,255,0.02); }
        .participant-row:last-child { border-bottom: none; }
        .p-name { font-weight: 800; color: white; }
        .p-uid { color: var(--text-muted); font-family: 'JetBrains Mono'; font-size: 0.7rem; background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 6px; }

        .comm-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            text-decoration: none;
            padding: 1.25rem;
            border-radius: 24px;
            font-weight: 900;
            text-align: center;
            margin-top: 2rem;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .comm-link:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(37, 211, 102, 0.4); }
        .comm-link:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <button onclick="history.back()" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">←</button>
            <div>
                <div style="font-size:0.55rem; color:var(--accent-primary); font-weight:900; letter-spacing:0.15em; text-transform:uppercase;">XP_ARENA</div>
                <div style="font-size:0.95rem; font-weight:800; letter-spacing:-0.01em;">SCRIM_DETAIL</div>
            </div>
        </div>
    </header>

    <div class="detail-container">
        <div id="loading" style="text-align: center; padding: 4rem; opacity: 0.5;">UPLINKING_DATA...</div>
        
        <div id="content" class="hidden">
            <div class="hero-panel">
                <div style="font-size: 0.7rem; font-weight: 800; color: var(--accent-secondary); letter-spacing: 0.2em; margin-bottom: 0.5rem;">BATTLE_ROYALE • <span id="mapName">---</span></div>
                <h1 id="prizePool" style="font-size: 2.5rem; font-weight: 800; margin: 0;">---</h1>
                <div class="countdown" id="timer">00:00:00</div>
                <p style="font-size: 0.75rem; color: var(--text-muted);">T-MINUS UNTIL ARENA INITIALIZATION</p>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Total Slots</div>
                    <div class="stat-value" id="totalSlots">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Filled Slots</div>
                    <div class="stat-value" id="filledSlots" style="color: var(--accent-primary);">0</div>
                </div>
            </div>

            <div class="participants-table">
                <div class="table-header">Registered Players</div>
                <div id="participantsList">
                    <!-- Rows injected here -->
                </div>
            </div>

            <a href="#" id="commLink" class="comm-link hidden" target="_blank">JOIN COMMUNAL CHANNEL</a>
        </div>
    </div>

    <!-- 📱 User Navigation -->
    <nav class="user-nav">
        <a href="generator.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="nav-label">GEN</span>
        </a>
        <a href="arena.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 10.63 21 8.55 21 8V7c0-1.1-.9-2-2-2zM7 10.82C5.84 10.4 5 9.3 5 8V7h2v3.82zM19 8c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
            <span class="nav-label">ARENA</span>
        </a>
        <a href="leaderboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z"/></svg>
            <span class="nav-label">TOP</span>
        </a>
        <a href="verify.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span class="nav-label">VERIFY</span>
        </a>
    </nav>

    <script>
        async function loadDetail() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) return;

            try {
                const res = await fetch(`/api/vault/tournaments/${id}`);
                const t = await res.json();
                if (!res.ok) throw new Error(t.error);

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');

                document.getElementById('mapName').textContent = t.map_name;
                document.getElementById('prizePool').textContent = t.prize_pool;
                document.getElementById('totalSlots').textContent = t.total_slots;
                document.getElementById('filledSlots').textContent = t.filled_slots;

                const pList = document.getElementById('participantsList');
                if (t.participants.length === 0) {
                    pList.innerHTML = '<div style="padding:3rem; text-align:center; opacity:0.3; font-size:0.7rem; font-weight:800; letter-spacing:0.1em;">NO_PLAYERS_REGISTERED_YET</div>';
                } else {
                    pList.innerHTML = t.participants.map((p, i) => `
                        <div class="participant-row">
                            <div class="p-name">${i+1}. ${p.user_name}</div>
                            <div class="p-uid">${p.user_uid}</div>
                        </div>
                    `).join('');
                }

                // Show link if they have an entry key in local storage for this tournament
                const savedKeys = JSON.parse(localStorage.getItem('xp_entry_keys') || '{}');
                if (savedKeys[id] && t.comm_link) {
                    const link = document.getElementById('commLink');
                    link.href = t.comm_link;
                    link.innerHTML = `<span>💬</span> JOIN COMMUNAL CHANNEL`;
                    link.classList.remove('hidden');
                }

                startTimer(t.start_at);
            } catch (e) {
                document.getElementById('loading').textContent = e.message.toUpperCase();
            }
        }

        function startTimer(endTime) {
            const end = new Date(endTime).getTime();
            const el = document.getElementById('timer');
            
            const tick = () => {
                const now = new Date().getTime();
                const diff = end - now;
                
                if (diff <= 0) {
                    el.textContent = "LIVE NOW";
                    return;
                }

                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            };

            setInterval(tick, 1000); tick();
        }

        window.onload = loadDetail;
    </script>
</body>
</html>
