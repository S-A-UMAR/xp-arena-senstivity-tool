<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>AXP | NEURAL DIAGNOSTIC</title>
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="gaming-animations.css">
  <link rel="stylesheet" href="gaming-components.css">
  <link rel="stylesheet" href="mobile-polish.css">
  <style>
    :root {
      --lab-bg: #020617;
      --lab-cyan: #00f2fe;
      --lab-violet: #a855f7;
      --lab-gold: #f59e0b;
      --hud-border: rgba(0, 242, 254, 0.2);
    }
    
    body.page-lab {
      background: var(--lab-bg);
      overflow: hidden;
      touch-action: none;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      margin: 0;
    }

    /* 📟 HUD_SCANLINES */
    body.page-lab::after {
      content: "";
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 2px);
      pointer-events: none; z-index: 10000;
    }

    .neural-grid {
      position: fixed; inset: 0;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 0.5), var(--lab-bg)),
        linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
      z-index: 1;
    }

    .hud-frame {
      position: fixed; inset: 20px;
      border: 1px solid var(--hud-border);
      pointer-events: none;
      z-index: 50;
    }
    .hud-corner {
      position: absolute; width: 20px; height: 20px;
      border: 2px solid var(--lab-cyan);
    }
    .hc-tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
    .hc-tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
    .hc-bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
    .hc-br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

    #gameZone {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }

    .diagnostic-target {
      position: absolute; width: 60px; height: 60px; border-radius: 50%;
      background: radial-gradient(circle, var(--lab-cyan) 0%, transparent 70%);
      border: 2px solid var(--lab-cyan);
      box-shadow: 0 0 30px var(--lab-cyan);
      cursor: crosshair; display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, opacity 0.2s; z-index: 100;
    }
    .diagnostic-target::before { content: ""; width: 4px; height: 4px; background: #fff; border-radius: 50%; }

    .certificate-card {
      background: linear-gradient(165deg, #0f172a 0%, #020617 100%);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
      width: 100%; max-width: 420px; padding: 2.5rem; position: relative;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8); overflow: hidden;
    }
    .cert-header {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 1rem; margin-bottom: 1.5rem;
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    .cert-logo { font-weight: 900; font-size: 1.2rem; letter-spacing: -0.05em; color: var(--lab-cyan); }
    .cert-id { font-family: monospace; font-size: 0.6rem; opacity: 0.4; }

    .metrics-cluster {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem;
    }
    .metric-box {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      padding: 12px; border-radius: 4px; text-align: center;
    }
    .mb-val { font-size: 1.3rem; font-weight: 950; display: block; line-height: 1; margin-bottom: 4px; }
    .mb-label { font-size: 0.45rem; font-family: monospace; opacity: 0.4; text-transform: uppercase; letter-spacing: 0.1em; }

    .narrative-box {
      background: rgba(0, 242, 254, 0.03); border-left: 2px solid var(--lab-cyan);
      padding: 1.2rem; font-size: 0.75rem; line-height: 1.6;
      margin-bottom: 1.5rem; color: rgba(255,255,255,0.8); font-family: 'JetBrains Mono', monospace;
    }

    .btn-cta {
      border: none; padding: 1rem 2rem; border-radius: 4px;
      font-weight: 900; letter-spacing: 0.1em; cursor: pointer; transition: 0.3s;
      text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-cta.cyan { background: var(--lab-cyan); color: #000; }
    .btn-cta.ghost { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid rgba(255,255,255,0.1); }

    .page-header {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
    }

    .mode-overlay, .result-overlay {
      position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center; z-index: 2000; transition: 0.5s;
    }
    .hidden { display: none !important; }

    .mode-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 400px; padding: 1rem;
    }
    .mode-card {
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 4px; padding: 1.5rem; text-align: center; cursor: pointer; transition: 0.3s;
    }
    .mode-card.active { background: rgba(0,242,254,0.1); border-color: var(--lab-cyan); }
    .mode-card-icon { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .mode-card-title { font-weight: 900; font-size: 0.6rem; letter-spacing: 0.1em; opacity: 0.6; }

    .lab-stats-top {
      position: fixed; top: 6rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 2rem; z-index: 100;
    }
    .stat-pill { text-align: center; }
  </style>
</head>
<body class="page-lab">
  <div class="neural-grid"></div>
  <div class="hud-frame">
    <div class="hud-corner hc-tl"></div><div class="hud-corner hc-tr"></div>
    <div class="hud-corner hc-bl"></div><div class="hud-corner hc-br"></div>
  </div>

  <header class="page-header" style="padding-top: max(1rem, env(safe-area-inset-top));">
    <a href="index.html" class="ph-back" style="background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 4px; color: #fff; text-decoration: none; font-size: 0.6rem; font-weight: 900;">EXIT_CORE</a>
    <div style="letter-spacing: 0.4em; font-weight: 900; font-size: 0.6rem; opacity: 0.4; color: var(--lab-cyan);">NEURAL_DIAGNOSTIC_HUB</div>
    <div style="width: 80px;"></div>
  </header>

  <div class="lab-stats-top hidden" id="liveStats">
    <div class="stat-pill">
      <div style="font-size: 0.4rem; opacity: 0.4; letter-spacing: 0.2em;">LATENCY</div>
      <div id="currentAvg" style="font-weight: 900; font-size: 1.2rem;">0ms</div>
    </div>
    <div class="stat-pill">
      <div style="font-size: 0.4rem; opacity: 0.4; letter-spacing: 0.2em;">PROGRESS</div>
      <div id="hitCount" style="font-weight: 900; font-size: 1.2rem;">0/30</div>
    </div>
  </div>

  <div id="gameZone"></div>

  <div id="modeOverlay" class="mode-overlay">
    <div class="flex flex-col items-center">
      <div class="mode-grid">
        <div class="mode-card active" onclick="setMode('flick', this)"><div class="mode-card-icon">🎯</div><div class="mode-card-title">FLICK</div></div>
        <div class="mode-card" onclick="setMode('tracking', this)"><div class="mode-card-icon">👁️</div><div class="mode-card-title">TRACKING</div></div>
        <div class="mode-card" onclick="setMode('reflex', this)"><div class="mode-card-icon">⚡</div><div class="mode-card-title">REFLEX</div></div>
        <div class="mode-card" onclick="setMode('grid', this)"><div class="mode-card-icon">⏹️</div><div class="mode-card-title">GRID_SYNC</div></div>
        <div class="mode-card" onclick="setMode('surge', this)"><div class="mode-card-icon">☢️</div><div class="mode-card-title">SURGE</div></div>
      </div>
      <button class="btn-cta cyan w-full mt-8" style="max-width: 400px; padding: 1.2rem;" onclick="startTest()">INITIALIZE_DIAGNOSTIC</button>
    </div>
  </div>

  <div id="resultOverlay" class="result-overlay hidden">
    <div class="certificate-card" id="cardToCapture">
      <div class="cert-header">
        <div class="cert-logo">AXP_NEURAL_CERTIFICATE</div>
        <div class="cert-id" id="diagnosticId">LAB-BUFFERING</div>
      </div>
      <div class="metrics-cluster">
        <div class="metric-box"><span class="mb-val" id="finalAvg">--</span><span class="mb-label">LATENCY_MS</span></div>
        <div class="metric-box"><span class="mb-val" id="finalPrecision">--%</span><span class="mb-label">ACCURACY</span></div>
        <div class="metric-box"><span class="mb-val" id="perfRank" style="color: var(--lab-cyan);">RECRUIT</span><span class="mb-label">RANK</span></div>
      </div>
      <div class="metrics-cluster" style="grid-template-columns: repeat(2, 1fr); margin-top: -5px;">
        <div class="metric-box"><span class="mb-val" id="jitterVal" style="color: var(--lab-violet);">--</span><span class="mb-label">JITTER_INDEX</span></div>
        <div class="metric-box"><span class="mb-val" id="accelVal" style="color: var(--lab-gold);">--</span><span class="mb-label">NEURAL_SYNC</span></div>
      </div>
      <div class="narrative-box" id="advisorQuote">ANALYZING_BIOMETRICS...</div>
      <div class="flex flex-col gap-3">
        <div class="flex gap-3">
          <button class="btn-cta ghost flex-1" style="font-size: 0.6rem;" onclick="copyLabId()">COPY_UPLINK</button>
          <button class="btn-cta cyan flex-1" style="font-size: 0.6rem;" onclick="downloadLabCard()">SAVE_RESULT</button>
        </div>
        <button class="btn-cta ghost w-full" style="font-size: 0.5rem; opacity: 0.4;" onclick="location.reload()">RE_CALIBRATE</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="translations.js"></script>
  <script src="gaming-effects.js"></script>
  <script src="notifications.js"></script>
  <script>
    let latencies = [];
    let hits = 0;
    const maxHits = 30;
    let isRunning = false;
    let currentMode = 'flick';
    let lapStartTime = 0;

    function setMode(mode, el) {
      currentMode = mode;
      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
    }

    function startTest() {
      document.getElementById('modeOverlay').classList.add('hidden');
      document.getElementById('liveStats').classList.remove('hidden');
      hits = 0; latencies = [];
      isRunning = true;
      spawnTarget();
    }

    function spawnTarget() {
      if (hits >= maxHits) return endTest();
      
      const zone = document.getElementById('gameZone');
      zone.innerHTML = '';
      const target = document.createElement('div');
      target.className = 'diagnostic-target';
      
      if (currentMode === 'grid') {
        const x = (hits % 3) * 30 + 20;
        const y = Math.floor(hits / 3 % 3) * 30 + 20;
        target.style.left = x + '%';
        target.style.top = y + '%';
      } else {
        target.style.left = Math.random() * 80 + 10 + '%';
        target.style.top = Math.random() * 80 + 10 + '%';
      }

      lapStartTime = performance.now();
      target.onclick = () => {
        const lat = performance.now() - lapStartTime;
        latencies.push(lat);
        hits++;
        document.getElementById('currentAvg').textContent = Math.round(latencies.reduce((a,b)=>a+b,0)/latencies.length) + 'ms';
        document.getElementById('hitCount').textContent = `${hits}/${maxHits}`;
        spawnTarget();
      };
      
      zone.appendChild(target);
    }

    async function endTest() {
      isRunning = false;
      document.getElementById('gameZone').innerHTML = '';
      document.getElementById('liveStats').classList.add('hidden');
      
      const avg = latencies.reduce((a,b)=>a+b,0)/latencies.length;
      const precision = Math.max(60, 100 - (avg / 20)); 
      
      document.getElementById('finalAvg').textContent = Math.round(avg);
      document.getElementById('finalPrecision').textContent = Math.round(precision) + '%';
      
      const jitter = (Math.random() * (avg / 100)).toFixed(2);
      const sync = (precision * 0.9).toFixed(1);
      document.getElementById('jitterVal').textContent = jitter;
      document.getElementById('accelVal').textContent = sync + '%';

      const rankEl = document.getElementById('perfRank');
      if (avg < 200) rankEl.textContent = 'NEXUS_GOD';
      else if (avg < 250) rankEl.textContent = 'ELITE';
      else rankEl.textContent = 'OPERATOR';

      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#00f2fe', '#a855f7', '#ffffff']
      });

      document.getElementById('advisorQuote').innerHTML = `Neural Latency: ${Math.round(avg)}ms. Consistency: ${sync}%. <br><br> **DIAGNOSTIC:** Your response profile is optimized for ${avg < 240 ? 'AGILITY' : 'STABILITY'}.`;

      document.getElementById('resultOverlay').classList.remove('hidden');
      
      try {
        const res = await fetch('/api/vault/diagnostics/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ avg_reaction_ms: avg, precision_score: precision, mode: currentMode })
        });
        const data = await res.json();
        if (data.diagnostic_id) document.getElementById('diagnosticId').textContent = data.diagnostic_id;
      } catch (e) {
        document.getElementById('diagnosticId').textContent = 'LAB-OFFLINE';
      }
    }

    function copyLabId() {
      const id = document.getElementById('diagnosticId').textContent;
      navigator.clipboard.writeText(id);
      alert('UPLINK_COPIED');
    }

    function downloadLabCard() {
      const card = document.getElementById('cardToCapture');
      html2canvas(card, { backgroundColor: '#020617', scale: 2 }).then(canvas => {
        const link = document.createElement('a');
        link.download = `AXP_CERT_${document.getElementById('diagnosticId').textContent}.png`;
        link.href = canvas.toDataURL();
        link.click();
      });
    }
  </script>
</body>
</html>
