<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XP ARENA - Organization Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .org-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 1rem;
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-cyan);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-cyan);
            margin-bottom: 0.2rem;
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }
        .funnel-container {
            background: rgba(0, 0, 0, 0.2);
            padding: 2rem;
            border-radius: 1rem;
            margin-top: 2rem;
        }
        .funnel-step {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        .step-label {
            width: 200px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .step-bar-bg {
            flex-grow: 1;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            overflow: hidden;
        }
        .step-bar-fill {
            height: 100%;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan-glow);
            transition: width 1s ease-in-out;
        }
        .step-percent {
            width: 60px;
            text-align: right;
            font-size: 0.8rem;
            font-weight: 900;
            color: var(--accent-cyan);
        }
    </style>
</head>
<body class="admin-body">
    <div id="three-canvas-container"></div>
    
    <div class="app-wrapper">
        <header class="hero">
            <div class="logo-area">
                <span class="logo-chip" id="orgName">ORGANIZATION</span>
                <h1 class="glow-text">COMMAND CENTER</h1>
            </div>
            <p id="orgIdDisplay" style="font-family: monospace; font-size: 0.8rem; opacity: 0.5;">ID: --</p>
        </header>

        <main class="grid-layout">
            <section class="panel glass-panel visible">
                <div class="org-stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalVendors">--</div>
                        <div class="stat-label">Total Creators</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalCodes">--</div>
                        <div class="stat-label">Active Keys</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="conversionRate">--%</div>
                        <div class="stat-label">Avg. Conversion</div>
                    </div>
                </div>

                <div class="funnel-container">
                    <h3 style="margin-bottom: 1.5rem; font-size: 0.9rem; letter-spacing: 2px;">NEURAL CONVERSION FUNNEL</h3>
                    <div id="funnelSteps">
                        <!-- Steps will be injected here -->
                    </div>
                </div>

                <div class="vendor-list-section" style="margin-top: 3rem;">
                    <h2 style="font-size: 1rem; margin-bottom: 1rem;">CREATOR PERFORMANCE</h2>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>CREATOR</th>
                                <th>KEYS</th>
                                <th>CLICKS</th>
                                <th>CVR</th>
                            </tr>
                        </thead>
                        <tbody id="creatorList">
                            <!-- List will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="three_hub.js"></script>
    <script>
        // Mock Data for Phase 3 Visualization
        const mockOrg = {
            id: 'XP-AGENCY-ALPHA',
            name: 'ELITE GAMING AGENCY',
            vendors: 12,
            codes: 145,
            conversion: 68.4,
            funnel: [
                { label: 'LANDING VIEWS', val: 100 },
                { label: 'CALCULATIONS', val: 82 },
                { label: 'ENCRYPTIONS', val: 78 },
                { label: 'RESULT VIEWS', val: 75 },
                { label: 'CARD DOWNLOADS', val: 68 }
            ],
            creators: [
                { name: 'GHOST_01', keys: 24, clicks: 1200, cvr: '72%' },
                { name: 'CYBER_PUNK', keys: 18, clicks: 850, cvr: '65%' },
                { name: 'NEON_SOUL', keys: 32, clicks: 2100, cvr: '78%' }
            ]
        };

        function initDashboard() {
            document.getElementById('orgName').textContent = mockOrg.name;
            document.getElementById('orgIdDisplay').textContent = `ID: ${mockOrg.id}`;
            document.getElementById('totalVendors').textContent = mockOrg.vendors;
            document.getElementById('totalCodes').textContent = mockOrg.codes;
            document.getElementById('conversionRate').textContent = `${mockOrg.conversion}%`;

            const funnel = document.getElementById('funnelSteps');
            funnel.innerHTML = mockOrg.funnel.map(step => `
                <div class="funnel-step">
                    <div class="step-label">${step.label}</div>
                    <div class="step-bar-bg">
                        <div class="step-bar-fill" style="width: ${step.val}%"></div>
                    </div>
                    <div class="step-percent">${step.val}%</div>
                </div>
            `).join('');

            const list = document.getElementById('creatorList');
            list.innerHTML = mockOrg.creators.map(c => `
                <tr>
                    <td><b>${c.name}</b></td>
                    <td>${c.keys}</td>
                    <td>${c.clicks}</td>
                    <td><span class="status-badge" style="background: rgba(0, 240, 255, 0.1); color: var(--accent-cyan); border-color: var(--accent-cyan);">${c.cvr}</span></td>
                </tr>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
