<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>AXP | TOURNAMENT ARENA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="vendor_shared.css">
    <link rel="stylesheet" href="vendor_nav.css">
</head>
<body>
    <div class="container">
        <!-- 💠 Elite Scrim Panel -->
        <div class="glass-panel" style="background: linear-gradient(145deg, rgba(0, 242, 254, 0.1), rgba(112, 0, 255, 0.05)); border-color: rgba(0, 242, 254, 0.2);">
            <div class="section-header">
                <div>
                    <span class="badge-elite">ELITE_SYSTEM</span>
                    <h2 class="section-title" style="margin-top: 0.5rem;">SCRIM_ARENA</h2>
                </div>
                <button class="btn-primary" style="padding: 0.75rem 1.5rem; width: auto; font-size: 0.8rem; background: var(--accent-secondary); box-shadow: 0 10px 25px rgba(0, 242, 254, 0.3);" onclick="VendorLogic.createEvent('scrim')">+ NEW_SCRIM</button>
            </div>
            <p style="font-size: 0.75rem; color: var(--text-muted); line-height: 1.6; margin-top: 1rem;">Automate your tournament registrations and slot management with real-time participation tracking.</p>
        </div>

        <div class="event-list">
            <div class="command-tile" onclick="VendorLogic.manageEvent('scrim_1')">
                <div class="command-icon" style="background: rgba(0, 242, 254, 0.1); color: var(--accent-secondary);">🏆</div>
                <div class="command-info">
                    <h3>PRO_SCRIMS_BERMUDA</h3>
                    <p>SLOTS: 42/48 · PRIZE: $50 · ACTIVE</p>
                </div>
            </div>
            
            <div class="command-tile" onclick="VendorLogic.manageEvent('scrim_2')">
                <div class="command-icon" style="background: rgba(0, 242, 254, 0.1); color: var(--accent-secondary);">🏆</div>
                <div class="command-info">
                    <h3>WEEKEND_CHAMPIONSHIP</h3>
                    <p>SLOTS: 15/48 · PRIZE: 2000 💎 · DRAFT</p>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor_layout.js"></script>
    <script src="vendor_logic.js"></script>
</body>
</html>
