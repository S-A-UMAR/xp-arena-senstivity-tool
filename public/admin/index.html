<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>AXP | MASTER ACCESS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-gate">

  <div id="privateGate" class="vault-gate">
    <div class="vault-card">
      <div class="vault-brand-mark" style="width:78px; height:78px; border-radius:22px; background:rgba(255,255,255,0.96); margin:0 auto 1rem; padding:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 26px rgba(16,185,129,0.2); animation:floatPulse 3.6s ease-in-out infinite;">
        <img src="../favicon.svg" alt="AXP" style="width:100%; height:100%; object-fit:contain;">
      </div>
      <div class="badge-gold mb-2">SYSTEM_OVERRIDE_V7</div>
      <h1 style="font-size: 2rem; font-weight: 900; color: #fff; margin-bottom: 1rem; letter-spacing: -0.02em;">MASTER<br>ACCESS</h1>
      <p class="text-xs text-muted mb-2" style="letter-spacing:0.08em;">ADMIN_SECRET_ONLY · USER_KEYS_WON'T_WORK_HERE</p>
      
      <input type="password" id="adminPass" class="vault-input" placeholder="ENTER_ADMIN_SECRET" maxlength="64">
      
      <p id="gateStatus" class="text-xs text-muted mb-4 font-mono" style="min-height: 1rem;">IDLE_UPLINK_STATUS</p>
      
      <button id="adminUnlockBtn" class="btn-cta gold w-full">UPLINK_CORE_ENGINE</button>
      
      <button class="btn-ghost auto w-full mt-2" style="font-size:0.62rem;" onclick="window.location.href='../index.html'">GO_TO_USER_PORTAL</button>
    </div>
  </div>

  <script src="core.js"></script>
  <script>
    let gateBusy = false;

    async function checkPass() {
      if (gateBusy) return;
      const pass = document.getElementById('adminPass').value.trim();
      const status = document.getElementById('gateStatus');
      const btn = document.getElementById('adminUnlockBtn');
      if (!pass) { status.textContent = 'KEY_REQUIRED'; return; }

      try {
        gateBusy = true;
        btn.textContent = 'ESTABLISHING_UPLINK...';
        btn.disabled = true;
        status.textContent = 'CONNECTING...';

        const res = await adminFetch('/api/vault/admin/login', {
          autoRedirect401: false,
          method: 'POST',
          body: JSON.stringify({ password: pass })
        });
        
        let payload = {};
        try { payload = await res.json(); } catch(_) {}

        if (res.ok && (payload.type === 'admin' || payload.token)) {
          if (payload.token) setAdminToken(payload.token);
          status.textContent = 'ACCESS_GRANTED ✓';
          setTimeout(() => window.location.href = 'dashboard.html', 500);
        } else {
          status.textContent = payload.error || 'ACCESS_DENIED';
          btn.textContent = 'UPLINK_CORE_ENGINE';
          btn.disabled = false;
        }
      } catch (e) {
        status.textContent = 'NODE_TIMEOUT — RETRY_OR_USE_USER_PORTAL';
        btn.textContent = 'UPLINK_CORE_ENGINE';
        btn.disabled = false;
      } finally { gateBusy = false; }
    }

    document.getElementById('adminUnlockBtn').addEventListener('click', checkPass);
    document.getElementById('adminPass').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPass();
    });

    // Auto-login check
    window.onload = async () => {
      if (getAdminToken()) {
        const ok = await checkSession();
        if (ok) window.location.href = 'dashboard.html';
      }
    };
  </script>
</body>
</html>
