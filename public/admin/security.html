<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>AXP | SECURITY OVERRIDE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-admin">

  <div class="page-wrap anim-stagger-in">
    <div class="section-header mb-4">
      <h2 class="section-title">SECURITY_OVERRIDE</h2>
    </div>

    <!-- Master Key Override -->
    <div class="card mb-3" style="border-color: var(--error);">
      <div class="section-eyebrow" style="color: var(--error);">DANGER_ZONE: MASTER_KEY_UPDATE</div>
      <p class="text-xs text-muted mb-3">UPDATING_THE_MASTER_KEY_WILL_REVOKE_EXISTING_SESSIONS</p>
      <input type="password" id="newMasterKey" placeholder="NEW_SECURE_PHRASE" class="p-2 w-full bg-dark border-gold rounded text-white mb-3">
      <button class="btn-cta gold w-full" style="background: var(--error); border-color: var(--error); color: #fff;" onclick="updateMasterKey()">UPDATE_MASTER_CREDENTIALS</button>
    </div>

    <!-- Security Logs -->
    <div class="card mb-3">
      <div class="section-header mb-3">
        <h2 class="section-title">SECURITY_EVENT_LOG</h2>
        <button class="btn-ghost auto" style="font-size: 0.6rem;" onclick="loadLogs()">REFRESH</button>
      </div>
      <div id="securityLogs" style="max-height: 300px; overflow-y: auto;">
        <div class="text-center py-4 opacity-30 text-xs font-mono">FETCHING_EVENT_LOG...</div>
      </div>
    </div>

    <!-- Audit Logs -->
    <div class="card">
      <div class="section-header mb-3">
        <h2 class="section-title">SYSTEM_AUDIT_TRAIL</h2>
      </div>
      <div id="auditLogs" style="max-height: 300px; overflow-y: auto;">
        <div class="text-center py-4 opacity-30 text-xs font-mono">FETCHING_AUDIT_TRAIL...</div>
      </div>
    </div>
  </div>

  <script src="../theme-manager.js"></script>
  <script src="core.js"></script>
  <script>
    async function updateMasterKey() {
      const key = document.getElementById('newMasterKey').value.trim();
      if (!key || key.length < 4) return adminNotify('KEY_TOO_SHORT', 'error');
      
      const confirmed = await adminConfirm('WARNING: THIS_WILL_CHANGE_ACCESS_FOR_ALL_ADMINS. PROCEED?');
      if (!confirmed) return;
      
      try {
        await api('/api/vault/admin/update-master-key', 'POST', { newKey: key });
        adminNotify('MASTER_KEY_UPDATED_SUCCESSFULLY', 'success');
        setTimeout(() => logoutAdmin(), 2000);
      } catch (e) { adminNotify('UPDATE_FAILED: ' + e.message, 'error'); }
    }

    async function loadLogs() {
      try {
        const [secLogs, auditLogs] = await Promise.all([
          api('/api/vault/admin/security-logs'),
          api('/api/vault/admin/audit-logs')
        ]);
        
        const secDiv = document.getElementById('securityLogs');
        const auditDiv = document.getElementById('auditLogs');

        if (!secLogs?.length) {
          secDiv.innerHTML = `
            <div class="text-center py-6 opacity-40">
              <div style="width: 36px; height: 36px; border: 1px solid var(--error); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </div>
              <div class="text-xs font-mono" style="letter-spacing: 0.1em;">NO_SECURITY_EVENTS</div>
            </div>`;
        } else {
          secDiv.innerHTML = secLogs.map(l => `
            <div class="log-row py-2 border-b border-white-5">
              <div class="flex justify-between">
                <span class="font-bold" style="color:var(--error); font-size:0.6rem;">${l.event_type}</span>
                <span class="opacity-40" style="font-size:0.55rem;">${new Date(l.created_at).toLocaleString()}</span>
              </div>
              <div class="text-xs opacity-70">${l.ip_address}</div>
            </div>
          `).join('');
        }

        if (!auditLogs?.length) {
          auditDiv.innerHTML = `
            <div class="text-center py-6 opacity-40">
              <div style="width: 36px; height: 36px; border: 1px dashed var(--cyan); border-radius: 8px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; animation: pulse 3s infinite;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              </div>
              <div class="text-xs font-mono" style="letter-spacing: 0.1em;">NO_AUDIT_ENTRIES</div>
            </div>`;
        } else {
          auditDiv.innerHTML = auditLogs.map(l => `
            <div class="log-row py-2 border-b border-white-5">
              <div class="flex justify-between">
                <span class="font-bold" style="color:var(--cyan); font-size:0.6rem;">${l.action}</span>
                <span class="opacity-40" style="font-size:0.55rem;">${new Date(l.created_at).toLocaleString()}</span>
              </div>
              <div class="text-xs opacity-70">${l.actor_type}: ${l.actor_id}</div>
            </div>
          `).join('');
        }
      } catch (e) { console.error('LOGS_ERR:', e); }
    }

    window.onload = async () => {
      renderAdminHeader('Security Override');
      renderAdminNav('security');
      const ok = await checkSession();
      if (ok) {
        loadLogs();
      }
    };
  </script>
</body>
</html>
