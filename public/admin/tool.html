<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>AXP | MASTER CALIBRATION</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-admin">

  <div class="page-wrap anim-stagger-in">
    <div class="section-header mb-4">
      <h2 class="section-title">SYSTEM_CALIBRATION</h2>
    </div>

    <!-- Global Offset -->
    <div class="card mb-3">
      <div class="section-eyebrow">GLOBAL_SENSITIVITY_OFFSET</div>
      <div class="flex items-center gap-4 py-4">
        <input type="range" id="globalOffset" min="0.5" max="1.5" step="0.01" value="1.0" class="flex-1 accent-gold" oninput="updateOffsetVal()">
        <div id="offsetVal" class="font-black text-xl" style="color: var(--gold); min-width: 60px;">1.00x</div>
      </div>
      <p class="text-xs text-muted font-mono mb-4">AFFECTS_ALL_CALCULATIONS_IN_REAL_TIME</p>
      <button class="btn-cta gold w-full" onclick="saveGlobalOffset()">APPLY_SYSTEM_WIDE</button>
    </div>

    <!-- Manual Code Audit -->
    <div class="card">
      <div class="section-header mb-3">
        <h2 class="section-title">GLOBAL_KEY_AUDIT</h2>
      </div>
      <div class="flex gap-2 mb-4">
        <input type="text" id="auditKey" placeholder="ENTER_LOOKUP_KEY" class="p-2 flex-1 bg-dark border-gold rounded text-white font-mono uppercase">
        <button class="btn-cta gold" style="padding: 0 1.5rem;" onclick="auditKey()">FETCH</button>
      </div>
      <div id="auditResult" class="text-xs font-mono opacity-40 text-center py-4 border border-white-5 rounded">
        IDLE_UPLINK_STATUS
      </div>
    </div>
  </div>

  <script src="../theme-manager.js"></script>
  <script src="core.js"></script>
  <script>
    function updateOffsetVal() {
      const val = document.getElementById('globalOffset').value;
      document.getElementById('offsetVal').textContent = parseFloat(val).toFixed(2) + 'x';
    }

    async function loadSettings() {
      try {
        const settings = await api('/api/vault/admin/settings');
        if (Array.isArray(settings)) {
          const offset = settings.find(s => s.setting_key === 'global_sensitivity_offset');
          if (offset) {
            document.getElementById('globalOffset').value = offset.setting_value;
            updateOffsetVal();
          }
        }
      } catch (e) { console.error('SETTINGS_LOAD_ERR:', e); }
    }

    async function saveGlobalOffset() {
      const val = document.getElementById('globalOffset').value;
      try {
        await api('/api/vault/admin/settings', 'POST', {
          key: 'global_sensitivity_offset',
          value: val
        });
        adminNotify('SYSTEM_OFFSET_APPLIED_SUCCESSFULLY', 'success');
      } catch (e) { adminNotify('APPLY_FAILED: ' + e.message, 'error'); }
    }

    async function auditKey() {
      const key = document.getElementById('auditKey').value.trim().toUpperCase();
      const resDiv = document.getElementById('auditResult');
      if (!key) return;
      
      try {
        resDiv.textContent = 'QUERYING_DATABASE...';
        const data = await api(`/api/vault/code/${key}/status`);
        resDiv.innerHTML = `
          <div class="text-left p-2">
            <div class="mb-1"><span class="opacity-50">VENDOR:</span> ${esc(data.vendor_id)}</div>
            <div class="mb-1"><span class="opacity-50">STATUS:</span> ${esc(data.status)}</div>
            <div class="mb-1"><span class="opacity-50">USAGE:</span> ${data.current_usage} / ${data.usage_limit || '∞'}</div>
            <div class="mb-1"><span class="opacity-50">CREATED:</span> ${new Date(data.created_at).toLocaleDateString()}</div>
          </div>
        `;
        resDiv.classList.remove('opacity-40');
      } catch (e) {
        resDiv.textContent = 'KEY_NOT_FOUND_OR_INVALID';
        resDiv.classList.add('opacity-40');
      }
    }

    window.onload = async () => {
      renderAdminHeader('Master Calibration');
      renderAdminNav('tool');
      const ok = await checkSession();
      if (ok) {
        loadSettings();
      }
    };
  </script>
</body>
</html>
