<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>AXP | NEURAL REGISTRY</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="page-admin">

  <div class="page-wrap anim-stagger-in">
    <div class="section-header mb-4">
      <h2 class="section-title">NEURAL_REGISTRY</h2>
      <div id="vendorCountChip" class="badge-gold">0 NODES</div>
    </div>

    <div id="vendorGrid">
      <div class="text-center py-12 opacity-30 text-xs font-mono">INITIALIZING_QUERY...</div>
    </div>
  </div>

  <!-- Action Sheet (Bulk Generate) -->
  <div id="bulkSheet" class="admin-sheet">
    <h3 style="color:var(--gold); font-size:1rem; font-weight:900; margin-bottom:1.5rem; letter-spacing:0.05em;">BULK_PROVISION_NODES</h3>
    <div class="flex flex-col gap-4">
      <input type="hidden" id="bulk_vid">
      <div class="input-wrap">
        <label>NODE_COUNT (1-100)</label>
        <input type="number" id="bulk_count" value="10" min="1" max="100" class="p-2 w-full bg-dark border-gold rounded text-white">
      </div>
      <div class="input-wrap">
        <label>BRAND_IDENTIFIER</label>
        <input type="text" id="bulk_brand" placeholder="BULK_PROVISION" class="p-2 w-full bg-dark border-gold rounded text-white">
      </div>
      <button class="btn-cta gold w-full mt-2" onclick="bulkGenerate()">GENERATE_BATCH</button>
      <div id="bulkProgress" class="text-xs font-mono text-center opacity-50">READY</div>
    </div>
  </div>

  <!-- Action Sheet (Add Vendor) -->
  <div id="sheetOverlay" class="sheet-overlay" onclick="toggleActionSheet(false)"></div>
  <div id="actionSheet" class="admin-sheet">
    <h3 style="color:var(--gold); font-size:1rem; font-weight:900; margin-bottom:1.5rem; letter-spacing:0.05em;">PROVISION_NEW_NODE</h3>
    <div class="flex flex-col gap-4">
      <div class="input-wrap">
        <label>VENDOR_ID (UNQIUE)</label>
        <input type="text" id="v_id" placeholder="e.g. AX-PRO-99" class="p-2 w-full bg-dark border-gold rounded text-white">
      </div>
      <div class="input-wrap">
        <label>ACCESS_PHRASE (OPTIONAL)</label>
        <input type="text" id="v_key" placeholder="LEAVE_BLANK_TO_AUTO_GENERATE" class="p-2 w-full bg-dark border-gold rounded text-white">
      </div>
      <div class="input-wrap">
        <label>MASTER_TIER</label>
        <select id="v_tier" class="p-2 w-full bg-dark border-gold rounded text-white">
          <option value="normal">NORMAL</option>
          <option value="gold">GOLD</option>
          <option value="premium">PREMIUM</option>
        </select>
      </div>
      <div class="flex gap-2">
        <div class="input-wrap flex-1">
          <label>GENERATION_LIMIT</label>
          <input type="number" id="v_usage" placeholder="e.g. 500 (blank = ∞)" class="p-2 w-full bg-dark border-gold rounded text-white" min="1">
        </div>
        <div class="input-wrap flex-1">
          <label>DURATION</label>
          <select id="v_duration" class="p-2 w-full bg-dark border-gold rounded text-white">
            <option value="">INFINITE</option>
            <option value="1">24_HOURS</option>
            <option value="7">7_DAYS</option>
            <option value="30">30_DAYS</option>
            <option value="365">1_YEAR</option>
          </select>
        </div>
      </div>
      <button class="btn-cta gold w-full mt-2" onclick="addVendor()">INITIALIZE_NODE</button>
    </div>
  </div>

  <!-- Action Sheet (Vendor Card Generated) -->
  <div id="cardSheet" class="admin-sheet" style="padding-bottom: 2rem;">
    <h3 style="color:var(--cyan); font-size:1rem; font-weight:900; margin-bottom:1.5rem; letter-spacing:0.05em; text-align:center;">NODE_PROVISIONED</h3>
    
    <!-- The physical card element to capture -->
    <div id="vendorCardContainer" style="background: linear-gradient(135deg, #0a0a0f, #13141c); border: 2px solid var(--gold); border-radius: 12px; padding: 2rem; position: relative; overflow: hidden; margin-bottom: 2rem; box-shadow: 0 0 30px rgba(245, 158, 11, 0.2);">
      <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0, 242, 254, 0.03) 0px, rgba(0, 242, 254, 0.03) 2px, transparent 4px); pointer-events: none;"></div>
      
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; position: relative; z-index: 2;">
        <div>
          <div style="font-family: monospace; font-size: 0.6rem; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; margin-bottom: 0.2rem;">AXP_NEURAL_NETWORK</div>
          <div style="font-weight: 900; font-size: 1.5rem; color: #fff; letter-spacing: 0.02em;">VENDOR_ID_CARD</div>
        </div>
        <div id="cardTierBadge" class="badge-gold" style="font-size: 0.7rem; padding: 0.3rem 0.6rem;">PREMIUM</div>
      </div>
      
      <div style="background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; position: relative; z-index: 2;">
        <div style="font-family: monospace; font-size: 0.6rem; color: var(--gold); margin-bottom: 0.2rem;">ASSIGNED_NODE_ID</div>
        <div id="cardVendorId" style="font-family: monospace; font-size: 1.2rem; color: #fff; letter-spacing: 0.05em;">AX-PRO-99</div>
      </div>
      
      <div style="background: rgba(0, 242, 254, 0.05); border: 1px solid var(--cyan); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; position: relative; z-index: 2;">
        <div style="font-family: monospace; font-size: 0.6rem; color: var(--cyan); margin-bottom: 0.2rem;">SECURE_ACCESS_PHRASE</div>
        <div id="cardAccessKey" style="font-family: monospace; font-size: 1.2rem; color: #fff; letter-spacing: 0.05em;">SECURE_PHRASE_HERE</div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: flex-end; position: relative; z-index: 2;">
        <div style="font-family: monospace; font-size: 0.5rem; color: rgba(255,255,255,0.3);">
          ISSUED_ON: <span id="cardDate">2026-05-01</span><br>
          AUTH_LEVEL: VENDOR_PORTAL
        </div>
        <div style="width: 80px; height: 30px; background: repeating-linear-gradient(90deg, #fff 0px, #fff 2px, transparent 2px, transparent 4px, #fff 4px, #fff 5px, transparent 5px, transparent 8px); opacity: 0.5;"></div>
      </div>
    </div>

    <button id="downloadCardBtn" class="btn-cta gold w-full" style="background: var(--cyan); border-color: var(--cyan); color: #000;" onclick="downloadVendorCard()">DOWNLOAD_IDENTITY_CARD</button>
    <button class="btn-ghost auto w-full mt-3" onclick="toggleCardSheet(false)">CLOSE</button>
  </div>

  <script src="core.js"></script>
  <script>
    let allVendorsCache = [];

    async function loadVendors() {
      try {
        const vendors = await api('/api/vault/admin/vendors');
        allVendorsCache = Array.isArray(vendors) ? vendors : [];
        renderVendorCards(allVendorsCache);
        document.getElementById('vendorCountChip').textContent = allVendorsCache.length + ' NODES';
      } catch (e) {
        console.error('NODES_ERR:', e);
      }
    }

    function renderVendorCards(vendors) {
      const container = document.getElementById('vendorGrid');
      if (!vendors.length) {
        container.innerHTML = `
          <div class="text-center py-12 opacity-40">
            <div style="width: 50px; height: 50px; border: 1px dashed var(--gold); border-radius: 12px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; animation: pulse 3s infinite;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div class="text-xs font-mono" style="letter-spacing: 0.1em;">NO_VENDORS_BUFFERED</div>
          </div>`;
        return;
      }
      const tierColor = { 
        premium: '#a855f7', // Violet
        gold: '#f59e0b',    // Amber
        platinum: '#e2e8f0', // Platinum
        nexus: '#00e5ff',   // Cyan
        normal: '#94a3b8'   // Muted
      };
      container.innerHTML = vendors.map(v => {
        const usageText = v.usage_limit ? `${v.current_usage || 0}/${v.usage_limit}` : '∞';
        const expiryText = v.active_until ? new Date(v.active_until).toLocaleDateString() : 'NEVER';
        const isExpired = v.active_until && new Date(v.active_until) < new Date();
        const statusColor = isExpired ? 'var(--error)' : v.status === 'active' ? 'var(--success)' : 'var(--tx-muted)';
        const statusText = isExpired ? 'EXPIRED' : v.status.toUpperCase();
        
        const tierStyle = `color: ${tierColor[v.tier] || '#fff'}; border-color: ${tierColor[v.tier] || '#fff'}44; box-shadow: 0 0 10px ${tierColor[v.tier] || '#fff'}22;`;
        
        return `
        <div class="registry-node anim-fade-in">
          <div class="flex justify-between items-start mb-1">
            <div class="text-xs font-mono" style="color: var(--tx-muted); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;">ID: ${v.vendor_id}</div>
            <div class="badge" style="${tierStyle}">${v.tier.toUpperCase()}</div>
          </div>
          
          <div class="font-black mb-4" style="font-size: 1.4rem; color: #ffffff !important; letter-spacing: -0.01em; line-height: 1;">
            ${esc(v.brand_config?.display_name || v.vendor_id)}
          </div>
          
          <div class="divider-gaming" style="opacity: 0.1; margin: 1rem 0;"></div>

          <div class="flex gap-4 mb-3">
            <div class="text-xs font-mono" style="color: var(--tx-muted); font-size: 0.65rem;">
              GENERATIONS: <span style="color: var(--cyan); font-weight: 800;">${usageText}</span>
            </div>
            <div class="text-xs font-mono" style="color: var(--tx-muted); font-size: 0.65rem;">
              EXPIRES: <span style="color: var(--cyan); font-weight: 800;">${expiryText}</span>
            </div>
          </div>

          <div class="text-xs font-mono mb-5" style="color: var(--tx-muted); font-size: 0.65rem;">
            STATUS: <span style="color: ${statusColor}; font-weight: 800;">${statusText}</span>
          </div>

          <div class="flex flex-wrap gap-2 mt-2 pt-4 border-t border-white-5">
            <button class="btn-ghost auto flex-1" style="font-size: 0.65rem; font-weight: 800; padding: 0.65rem;" onclick="copyVendorLink('${v.vendor_id}')">UPLINK</button>
            <button class="btn-ghost auto flex-1" style="font-size: 0.65rem; font-weight: 800; padding: 0.65rem; color: var(--gold);" onclick="openRedownloadCard('${v.vendor_id}')">CARD</button>
            <button class="btn-ghost auto" style="font-size: 0.65rem; font-weight: 800; padding: 0.65rem 1rem; color: var(--cyan);" onclick="toggleBulkSheet(true, '${v.vendor_id}')">BULK</button>
            <button class="btn-ghost auto" style="font-size: 0.65rem; font-weight: 800; padding: 0.65rem 1rem; color: ${v.status === 'active' ? 'var(--gold)' : 'var(--success)'};" onclick="toggleSuspension('${v.vendor_id}', '${v.status}')">
              ${v.status === 'active' ? 'SUSPEND' : 'ACTIVATE'}
            </button>
            <button class="btn-ghost auto" style="font-size: 0.65rem; font-weight: 800; padding: 0.65rem 1rem; color: var(--error);" onclick="confirmDeleteVendor('${v.vendor_id}')">ERASE</button>
          </div>
        </div>
      `}).join('');
    }

    async function toggleSuspension(vid, currentStatus) {
      const nextStatus = currentStatus === 'active' ? 'suspended' : 'active';
      const confirmed = await adminConfirm(`CONFIRM: ${nextStatus.toUpperCase()}_NODE_${vid}?`);
      if (!confirmed) return;
      
      try {
        await api(`/api/vault/admin/vendor/${vid}/status`, 'POST', { status: nextStatus });
        adminNotify(`NODE_${vid}_${nextStatus.toUpperCase()}`, 'success');
        loadVendors();
      } catch (e) { adminNotify('STATUS_UPDATE_FAILED: ' + e.message, 'error'); }
    }

    function openRedownloadCard(vid) {
      const v = allVendorsCache.find(x => x.vendor_id === vid);
      if (!v) return adminNotify('VENDOR_NOT_FOUND', 'error');
      
      document.getElementById('cardVendorId').textContent = v.vendor_id;
      document.getElementById('cardAccessKey').textContent = 'HIDDEN_FOR_SECURITY';
      document.getElementById('cardTierBadge').textContent = v.tier.toUpperCase();
      document.getElementById('cardDate').textContent = new Date(v.created_at || Date.now()).toISOString().split('T')[0];
      toggleCardSheet(true);
    }

    function toggleActionSheet(show) {
      document.getElementById('sheetOverlay').classList.toggle('active', show);
      document.getElementById('actionSheet').classList.toggle('active', show);
      document.getElementById('bulkSheet').classList.remove('active');
      document.getElementById('cardSheet').classList.remove('active');
    }

    function toggleCardSheet(show) {
      document.getElementById('sheetOverlay').classList.toggle('active', show);
      document.getElementById('cardSheet').classList.toggle('active', show);
    }

    function toggleBulkSheet(show, vid = '') {
      document.getElementById('sheetOverlay').classList.toggle('active', show);
      document.getElementById('bulkSheet').classList.toggle('active', show);
      if (vid) document.getElementById('bulk_vid').value = vid;
    }

    async function bulkGenerate() {
      const vid = document.getElementById('bulk_vid').value;
      const count = parseInt(document.getElementById('bulk_count').value);
      const brand = document.getElementById('bulk_brand').value;
      const progress = document.getElementById('bulkProgress');

      try {
        progress.textContent = 'PROVISIONING...';
        const res = await api(`/api/vault/admin/vendors/${vid}/bulk-generate`, 'POST', { count, brand });
        progress.textContent = `SUCCESS: ${res.count} CODES CREATED`;
        setTimeout(() => toggleBulkSheet(false), 2000);
      } catch (e) {
        progress.textContent = 'FAILED: ' + e.message;
      }
    }

    async function addVendor() {
      const vid = document.getElementById('v_id').value.trim();
      const vkey = document.getElementById('v_key').value.trim();
      const vtier = document.getElementById('v_tier').value;
      const vusage = document.getElementById('v_usage').value;
      const vduration = document.getElementById('v_duration').value;
      
      if (!vid) return adminNotify('VENDOR_ID_IS_REQUIRED', 'error');

      try {
        const result = await api('/api/vault/admin/vendors', 'POST', {
          vendorId: vid,
          accessKey: vkey || undefined,
          tier: vtier,
          usageLimit: vusage ? parseInt(vusage) : null,
          durationDays: vduration ? parseInt(vduration) : null,
          brandConfig: { display_name: vid }
        });
        
        toggleActionSheet(false);
        
        // 🛡️ SYNC_CARD: Use the actual data returned by the server
        document.getElementById('cardVendorId').textContent = result.vendorId;
        document.getElementById('cardAccessKey').textContent = result.accessKey;
        document.getElementById('cardTierBadge').textContent = result.tier.toUpperCase();
        document.getElementById('cardDate').textContent = new Date().toISOString().split('T')[0];
        toggleCardSheet(true);

        adminNotify('NODE_PROVISIONED_SUCCESSFULLY', 'success');
        loadVendors();
      } catch (e) { adminNotify('NODE_CREATION_FAILED: ' + e.message, 'error'); }
    }

    async function downloadVendorCard() {
      const btn = document.getElementById('downloadCardBtn');
      const container = document.getElementById('vendorCardContainer');
      const vid = document.getElementById('cardVendorId').textContent;
      
      btn.textContent = 'GENERATING_IMAGE...';
      btn.disabled = true;

      try {
        if (typeof html2canvas === 'undefined') {
          throw new Error('Image generator library is still loading. Please try again in a moment.');
        }

        const canvas = await html2canvas(container, {
          backgroundColor: '#0a0a0f',
          scale: 2, // High resolution
          logging: false
        });

        const link = document.createElement('a');
        link.download = `AXP_NODE_${vid}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();

        btn.textContent = 'DOWNLOAD_SUCCESSFUL';
        setTimeout(() => {
          btn.textContent = 'DOWNLOAD_IDENTITY_CARD';
          btn.disabled = false;
        }, 3000);
      } catch (err) {
        console.error(err);
        adminNotify('GENERATION_FAILED: ' + err.message, 'error');
        btn.textContent = 'DOWNLOAD_IDENTITY_CARD';
        btn.disabled = false;
      }
    }

    async function confirmDeleteVendor(vid) {
      const confirmed = await adminConfirm(`ARE_YOU_SURE? ERASE_NODE_${vid}? ALL_DATA_WILL_BE_LOST.`);
      if (!confirmed) return;
      try {
        await api(`/api/vault/admin/vendors/${vid}`, 'DELETE');
        adminNotify(`NODE_${vid}_ERASED`, 'success');
        loadVendors();
      } catch(e) { adminNotify('ERASE_FAILED: ' + e.message, 'error'); }
    }

    function copyVendorLink(vid) {
      const url = `${window.location.origin}/index.html?v=${vid}`;
      navigator.clipboard.writeText(url).then(() => {
        adminNotify('LINK_COPIED_TO_NEURAL_BUFFER', 'success');
      });
    }

    window.onload = async () => {
      renderAdminHeader('Neural Registry');
      renderAdminNav('nodes');
      const ok = await checkSession();
      if (ok) {
        loadVendors();
        
        // 🛡️ AUTO_ACTION: If redirected with ?action=add, open the sheet immediately
        const params = new URLSearchParams(window.location.search);
        if (params.get('action') === 'add') {
          setTimeout(() => toggleActionSheet(true), 300);
        }
      }
    };
  </script>
</body>
</html>
