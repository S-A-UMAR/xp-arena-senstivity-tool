<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XP ARENA | CREATOR HQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --accent-primary: #00ff88;
            --accent-primary-glow: rgba(0, 255, 136, 0.4);
            --accent-secondary: #00f2fe;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #888888;
            --font-heading: 'Outfit', sans-serif;
            --font-mono: 'JetBrains+Mono', monospace;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-heading);
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 136, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* 🧪 Neural Glass UI */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            margin: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }

        /* 📊 Data Tiles */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin: 1rem;
        }

        .stat-tile {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-val {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--accent-primary);
            font-family: var(--font-mono);
        }

        .stat-label {
            font-size: 0.55rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }

        /* 🧭 Sticky Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active { color: var(--accent-primary); }

        .nav-item svg { width: 20px; height: 20px; }
        .nav-label { font-size: 0.6rem; font-weight: 800; }

        .fab-container { position: relative; }
        .fab-btn {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 56px;
            height: 56px;
            background: var(--accent-primary);
            border-radius: 50%;
            border: 4px solid var(--bg-deep);
            color: var(--bg-deep);
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-primary-glow);
            transition: 0.3s;
        }

        /* 🎚️ Action Sheet */
        .action-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: #111;
            border-top: 1px solid var(--accent-primary);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            padding: 2rem;
            z-index: 2000;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .action-sheet.active { bottom: 0; }

        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 1500;
        }

        .sheet-overlay.active { opacity: 1; visibility: visible; }

        /* 🎮 Inputs */
        .form-control { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.5rem; letter-spacing: 0.1em; }
        .cyber-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-family: var(--font-mono);
            outline: none;
            box-sizing: border-box;
        }
        .cyber-input:focus { border-color: var(--accent-primary); }

        .btn-primary {
            width: 100%;
            background: var(--accent-primary);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 800;
            font-family: var(--font-heading);
            cursor: pointer;
            box-shadow: 0 0 15px var(--accent-primary-glow);
        }

        /* 📊 Bar Chart Analytics */
        .chart-container {
            margin-top: 1.5rem;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 120px;
            gap: 8px;
        }
        .bar {
            flex: 1;
            background: var(--accent-primary);
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            min-height: 4px;
            transition: height 0.5s ease;
            position: relative;
        }
        .bar:hover::after {
            content: attr(data-val);
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5rem;
            color: var(--accent-primary);
        }
        .chart-label {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        /* 📋 Generated Output */
        .code-display {
            background: rgba(0, 255, 136, 0.05);
            border: 2px dashed var(--accent-primary);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            margin-top: 1rem;
        }
        .code-val {
            font-size: 2rem;
            font-family: var(--font-mono);
            font-weight: 800;
            color: var(--accent-primary);
            letter-spacing: 0.2em;
        }

        /* 🕹️ Gaming Architecture Form */
        .segmented-control {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        .segment-toggle {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        .segment-toggle.active {
            background: var(--accent-primary);
            color: #000;
            box-shadow: 0 0 10px var(--accent-primary-glow);
        }

        .cyber-slider {
            width: 100%;
            height: 4px;
            background: var(--glass-border);
            border-radius: 2px;
            appearance: none;
            outline: none;
            margin: 1.5rem 0;
        }
        .cyber-slider::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-primary-glow);
        }
    </style>
</head>
<body>

    <header style="padding: 1.5rem 1rem 0.5rem; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <div style="font-size: 0.6rem; color: var(--accent-primary); font-weight: 800; letter-spacing: 0.2em;">CREATOR_ACCESS</div>
            <h1 id="vendorTitle" style="margin: 0; font-size: 1.25rem;">LOADING_PROFILE...</h1>
        </div>
        <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--glass-bg); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center;">👤</div>
    </header>

    <!-- 📊 Stats Section -->
    <div class="stat-grid">
        <div class="stat-tile">
            <span class="stat-val" id="statCodes">--</span>
            <span class="stat-label">CODES</span>
        </div>
        <div class="stat-tile">
            <span class="stat-val" id="statHits">--</span>
            <span class="stat-label">HITS</span>
        </div>
        <div class="stat-tile">
            <span class="stat-val" id="statStatus">OK</span>
            <span class="stat-label">STATUS</span>
        </div>
    </div>

    <!-- 🏠 Home Section -->
    <div id="section-home" class="nav-section">
        <div class="glass-panel">
            <div style="margin-bottom: 2rem; text-align: center;">
                <h2 style="margin: 0; font-size: 1.1rem; color: var(--accent-primary);">AUTO-GENERATOR</h2>
                <p style="font-size: 0.65rem; color: var(--text-muted); margin-top: 5px;">Smart Calibration based on latest meta</p>
            </div>

            <!-- 🕹️ Gaming Architecture -->
            <div style="margin-top: 1rem;">
                <div class="form-control">
                    <label>GAMING ARCHITECTURE</label>
                    <select id="genBrand" class="cyber-input" onchange="updateSeries()">
                        <option value="">SELECT BRAND</option>
                    </select>
                </div>

                <div class="form-control">
                    <label>SERIES SELECTION</label>
                    <select id="genSeries" class="cyber-input" disabled onchange="updateModels()">
                        <option value="">SELECT SERIES</option>
                    </select>
                </div>

                <div class="form-control">
                    <label>MODEL SELECTION</label>
                    <select id="genModel" class="cyber-input" disabled>
                        <option value="">SELECT MODEL</option>
                    </select>
                </div>

                <div class="form-control">
                    <label>GRAPHICS CAPABILITY</label>
                    <div id="graphicsCap" class="cyber-input" style="background: rgba(0, 255, 136, 0.02); color: var(--accent-primary); font-weight: 800; border-style: dashed; text-align: center;">---</div>
                </div>

                <div class="form-control">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="margin: 0;">DEVICE MEMORY</label>
                        <span id="ramVal" style="color: white; font-size: 0.8rem; font-weight: 800;">8 GB</span>
                    </div>
                    <input type="range" id="genRam" min="2" max="16" step="2" value="8" class="cyber-slider" oninput="document.getElementById('ramVal').textContent = this.value + ' GB'">
                </div>

                <div class="form-control">
                    <label>COMBAT PLAYSTYLE</label>
                    <div class="segmented-control" id="playstyleGroup">
                        <button class="segment-toggle" data-val="slow" onclick="setSegment('playstyle', this)">SLOW</button>
                        <button class="segment-toggle active" data-val="balanced" onclick="setSegment('playstyle', this)">BALANCED</button>
                        <button class="segment-toggle" data-val="fast" onclick="setSegment('playstyle', this)">FAST</button>
                    </div>
                </div>

                <div class="form-control">
                    <label>FINGER CLAW STYLE</label>
                    <div class="segmented-control" id="clawGroup">
                        <button class="segment-toggle active" data-val="2" onclick="setSegment('claw', this)">2-FINGER</button>
                        <button class="segment-toggle" data-val="3" onclick="setSegment('claw', this)">3-FINGER</button>
                        <button class="segment-toggle" data-val="4" onclick="setSegment('claw', this)">4-FINGER</button>
                    </div>
                </div>
            </div>

            <button class="btn-primary" onclick="autoGenerate()" style="margin-top: 1rem;">GENERATE CODE</button>
        </div>

        <div id="genResult" class="glass-panel hidden">
            <div class="code-display">
                <div style="font-size: 0.5rem; opacity: 0.5; margin-bottom: 0.5rem;">VIRTUAL_ACCESS_KEY</div>
                <div id="accessKeyVal" class="code-val">XP-000-000</div>
                <button class="btn-primary" style="margin-top: 1rem; background: var(--glass-bg); color: #fff; box-shadow: none;" onclick="copyCode()">COPY TO V-CLIP</button>
            </div>
        </div>
    </div>

    <!-- 📈 Stats Section -->
    <div id="section-stats" class="nav-section hidden">
        <div class="glass-panel">
            <h3 style="margin: 0 0 1rem; font-size: 0.9rem;">DAILY UNLOCKS</h3>
            <div class="chart-container" id="barChart">
                <!-- Bars injected here -->
            </div>
            <div class="chart-label">
                <span>7D_AGO</span>
                <span>TODAY</span>
            </div>
        </div>

        <div class="glass-panel" style="padding: 0; overflow: hidden;">
            <div style="padding: 1.25rem; border-bottom: 1px solid var(--glass-border);">
                <h3 style="margin: 0; font-size: 0.9rem;">LIVE_TRANSFERS</h3>
            </div>
            <div id="logsBody" style="max-height: 250px; overflow-y: auto;">
                <!-- Logs injected here -->
            </div>
        </div>
    </div>

    <!-- 👤 Profile Section (New) -->
    <div id="section-profile" class="nav-section hidden">
        <div class="glass-panel">
            <h3 style="margin: 0 0 1.5rem; font-size: 0.9rem; color: var(--accent-primary);">PRO_BRANDING</h3>
            
            <div class="form-control">
                <label>CREATOR DISPLAY NAME</label>
                <input type="text" id="profName" class="cyber-input" placeholder="e.g. SKY-NET">
            </div>

            <div class="form-control">
                <label>LOGO URL (IMAGE UPLOAD SOON)</label>
                <input type="text" id="profLogo" class="cyber-input" placeholder="https://example.com/logo.png">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-control">
                    <label>YOUTUBE</label>
                    <input type="text" id="profYT" class="cyber-input" placeholder="@yourchannel">
                </div>
                <div class="form-control">
                    <label>TIKTOK</label>
                    <input type="text" id="profTT" class="cyber-input" placeholder="@yourname">
                </div>
            </div>

            <div class="form-control">
                <label>DISCORD INVITE</label>
                <input type="text" id="profDC" class="cyber-input" placeholder="discord.gg/invite">
            </div>

            <div class="form-control">
                <label>WEBHOOK URL</label>
                <input type="url" id="profWebhook" class="cyber-input" placeholder="https://example.com/webhook">
            </div>

            <button class="btn-primary" onclick="saveProfile()" style="margin-top: 1rem;">UPDATE_PRO_PROFILE</button>
        </div>

        <div class="glass-panel" style="background: rgba(255, 255, 255, 0.01);">
            <h3 style="margin: 0 0 1rem; font-size: 0.7rem; color: var(--text-muted);">SECURITY_RESOURCES</h3>
            <button class="btn-primary" style="background: var(--glass-bg); color: #fff; box-shadow: none; font-size: 0.7rem; margin-bottom: 0.5rem;" onclick="handleLogout()">REVOKE_ACCESS_TOKEN</button>
        </div>
    </div>

    <!-- 🎚️ Pro-Manual Action Sheet -->
    <div class="sheet-overlay" id="overlay" onclick="toggleSheet(false)"></div>
    <div class="action-sheet" id="manualSheet">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2 style="margin: 0; font-family: var(--font-heading);">PRO-MANUAL SUITE</h2>
            <button onclick="toggleSheet(false)" style="background: none; border: none; color: var(--text-muted); font-weight: 800;">CLOSE</button>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-control">
                <label>GENERAL</label>
                <input type="number" id="mGen" class="cyber-input" value="100" min="0" max="200">
            </div>
            <div class="form-control">
                <label>RED DOT</label>
                <input type="number" id="mRed" class="cyber-input" value="100" min="0" max="200">
            </div>
            <div class="form-control">
                <label>2X SCOPE</label>
                <input type="number" id="m2x" class="cyber-input" value="100" min="0" max="200">
            </div>
            <div class="form-control">
                <label>4X SCOPE</label>
                <input type="number" id="m4x" class="cyber-input" value="100" min="0" max="200">
            </div>
            <div class="form-control">
                <label>SNIPER</label>
                <input type="number" id="mSni" class="cyber-input" value="100" min="0" max="200">
            </div>
            <div class="form-control">
                <label>FREE LOOK</label>
                <input type="number" id="mFree" class="cyber-input" value="100" min="0" max="200">
            </div>
        </div>

        <div class="form-control">
            <label>CREATOR ADVICE (TIPS)</label>
            <textarea id="mAdvice" class="cyber-input" style="height: 80px; resize: none;" placeholder="e.g. Best with DPI 600..."></textarea>
        </div>
        <div class="form-control" style="margin-top: 1rem; margin-bottom: 2rem;">
            <label>BULK GENERATE AMOUNT (MAX 10)</label>
            <input type="number" id="mBulk" class="cyber-input" value="1" min="1" max="10">
        </div>

        <button class="btn-primary" onclick="submitManual()">PUBLISH MANUAL KEY(S)</button>
    </div>

    <!-- 🧭 Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="nav-label">HOME</span>
        </button>
        <button class="nav-item" onclick="switchTab('stats', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z"/></svg>
            <span class="nav-label">STATS</span>
        </button>
        <div class="fab-container">
            <button class="fab-btn" onclick="toggleSheet(true)">+</button>
        </div>
        <button class="nav-item" onclick="switchTab('profile', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span class="nav-label">PROFILE</span>
        </button>
        <button class="nav-item" onclick="handleLogout()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42A6.92 6.92 0 0 1 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7a6.92 6.92 0 0 1 2.59-5.41L6.17 5.17A8.99 8.99 0 0 0 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-3.12-1.59-5.87-4-7.5l-0.17 0.67z"/></svg>
            <span class="nav-label">POWER</span>
        </button>
    </nav>

    <script src="devices.js"></script>
    <script src="notifications.js"></script>
    <script src="settings.js"></script>
    <script src="update-overlay.js"></script>
    <script>
        // ⚡ Master Creator Logic
        const API_BASE = '/api/vault';
        
        async function api(path, method = 'GET', body = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include'
            };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(path, options);
            if (res.status === 401) window.location.href = '/verify.html';
            let payload = {};
            try { payload = await res.json(); } catch (_e) {}
            if (!res.ok) throw new Error(payload.error || payload.message || 'API_ERR');
            return payload;
        }

        async function init() {
            try {
                populateBrands(); // Init device lists
                loadDashboard();
                loadAnalytics();
                loadProfile(); // Load branding data
            } catch (e) {
                console.error(e);
            }
        }

        async function loadDashboard() {
            try {
                const profile = await api(`${API_BASE}/vendor/profile`);
                document.getElementById('vendorTitle').textContent = (profile.display_name || profile.vendor_id).toUpperCase();
                document.getElementById('statCodes').textContent = profile.total_codes;
                document.getElementById('statHits').textContent = profile.total_hits;
                
                const now = new Date();
                const isActive = profile.status === 'active' && (!profile.active_until || new Date(profile.active_until) > now);
                const statStatus = document.getElementById('statStatus');
                statStatus.textContent = isActive ? 'ONLINE' : 'LOCKED';
                statStatus.style.color = isActive ? 'var(--accent-primary)' : '#ff4444';
            } catch (e) {
                console.error('LOAD_DASH_ERR:', e);
            }
        }

        async function loadProfile() {
            try {
                const profile = await api(`${API_BASE}/vendor/profile`);
                if (profile) {
                    document.getElementById('profName').value = profile.display_name || '';
                    document.getElementById('profLogo').value = profile.logo_url || '';
                    document.getElementById('profYT').value = profile.youtube || '';
                    document.getElementById('profTT').value = profile.tiktok || '';
                    document.getElementById('profDC').value = profile.discord || '';
                    document.getElementById('profWebhook').value = profile.webhook_url || '';
                }
            } catch (e) {
                console.warn('LOAD_PROFILE_ERR:', e);
            }
        }

        async function saveProfile() {
            const data = {
                brand_config: {
                    display_name: document.getElementById('profName').value.trim(),
                    logo_url: document.getElementById('profLogo').value.trim(),
                    youtube: document.getElementById('profYT').value.trim(),
                    tiktok: document.getElementById('profTT').value.trim(),
                    discord: document.getElementById('profDC').value.trim()
                },
                webhook_url: document.getElementById('profWebhook').value.trim() || null
            };
            try {
                await api(`${API_BASE}/profile`, 'PUT', data);
                if (window.notify) window.notify('PROFILE_UPDATED_SYNCED', 'success');
                loadDashboard(); // Refresh UI
            } catch (e) {
                if (window.notify) window.notify('SYNC_FAILED', 'error');
            }
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.nav-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            if (window.SFX) window.SFX.play('click');
        }

        async function loadAnalytics() {
            try {
                const stats = await api(`${API_BASE}/vendor/stats`);
                const barChart = document.getElementById('barChart');
                if (stats && stats.length > 0) {
                    const max = Math.max(...stats.map(s => s.count)) || 1;
                    barChart.innerHTML = stats.map(s => `
                        <div class="bar" style="height: ${(s.count / max) * 100}%" data-val="${s.count}"></div>
                    `).join('');
                } else {
                    barChart.innerHTML = '<div style="width:100%; text-align:center; opacity:0.1; font-size:0.6rem;">NO_DATA</div>';
                }
            } catch (e) {}
        }

        // 🕹️ Gaming Architecture Logic
        let genState = {
            playstyle: 'balanced',
            claw: '2'
        };

        function populateBrands() {
            const brandSel = document.getElementById('genBrand');
            if (!window.DEVICES) return;
            window.DEVICES.forEach(b => {
                const opt = document.createElement('option');
                opt.value = opt.textContent = b.brand;
                brandSel.appendChild(opt);
            });
        }

        function updateSeries() {
            const brand = document.getElementById('genBrand').value;
            const seriesSel = document.getElementById('genSeries');
            const modelSel = document.getElementById('genModel');
            
            seriesSel.innerHTML = '<option value="">SELECT SERIES</option>';
            modelSel.innerHTML = '<option value="">SELECT MODEL</option>';
            modelSel.disabled = true;

            if (!brand) {
                seriesSel.disabled = true;
                return;
            }

            const data = window.DEVICES.find(d => d.brand === brand);
            if (data) {
                data.series.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = opt.textContent = s.name;
                    seriesSel.appendChild(opt);
                });
                seriesSel.disabled = false;
            }
        }

        function updateModels() {
            const brand = document.getElementById('genBrand').value;
            const series = document.getElementById('genSeries').value;
            const modelSel = document.getElementById('genModel');
            
            modelSel.innerHTML = '<option value="">SELECT MODEL</option>';
            
            if (!series) {
                modelSel.disabled = true;
                return;
            }

            const brandData = window.DEVICES.find(d => d.brand === brand);
            if (!brandData) {
                modelSel.disabled = true;
                return;
            }
            const seriesData = brandData.series.find(s => s.name === series);
            
            if (seriesData) {
                seriesData.models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = opt.textContent = m;
                    modelSel.appendChild(opt);
                });
                modelSel.disabled = false;
                
                // 📊 Update Graphics Capability Prediction
                const gCap = document.getElementById('graphicsCap');
                const isHigh = seriesData.name.toLowerCase().includes('ultra') || 
                               seriesData.name.toLowerCase().includes('pro max') || 
                               seriesData.name.toLowerCase().includes('gaming');
                gCap.textContent = isHigh ? 'ULTRA + MAX' : 'SMOOTH + ULTRA';
            }
        }

        function setSegment(type, el) {
            const parent = el.parentElement;
            parent.querySelectorAll('.segment-toggle').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            genState[type] = el.dataset.val;
        }

        function toggleSheet(show) {
            document.getElementById('overlay').classList.toggle('active', show);
            document.getElementById('manualSheet').classList.toggle('active', show);
        }

        async function autoGenerate() {
            try {
                const brand = document.getElementById('genBrand').value;
                const model = document.getElementById('genModel').value;
                if (!brand || !model) {
                    if (window.notify) window.notify('SELECT BRAND + MODEL FIRST', 'error');
                    return;
                }
                const body = {
                    brand,
                    series: document.getElementById('genSeries').value,
                    model,
                    ram: parseInt(document.getElementById('genRam').value),
                    speed: genState.playstyle,
                    claw: genState.claw
                };
                
                const res = await api(`${API_BASE}/vendor/generate`, 'POST', body);
                document.getElementById('genResult').classList.remove('hidden');
                document.getElementById('accessKeyVal').textContent = res.accessKey;
                if (window.notify) window.notify('AUTO_CALIBRATED_SUCCESS', 'success');
                loadDashboard(); // Refresh stats
            } catch (e) {
                if (window.notify) window.notify(e.message || 'VAULT_GENERATION_FAILED', 'error');
            }
        }

        async function submitManual() {
            try {
                const bulkAmount = Math.min(Math.max(parseInt(document.getElementById('mBulk').value) || 1, 1), 10);
                const body = {
                    general: parseInt(document.getElementById('mGen').value),
                    redDot: parseInt(document.getElementById('mRed').value),
                    scope2x: parseInt(document.getElementById('m2x').value),
                    scope4x: parseInt(document.getElementById('m4x').value),
                    sniper: parseInt(document.getElementById('mSni').value),
                    freeLook: parseInt(document.getElementById('mFree').value),
                    advice: document.getElementById('mAdvice').value
                };
                const requiredValues = [body.general, body.redDot, body.scope2x, body.scope4x, body.sniper, body.freeLook];
                if (requiredValues.some(v => Number.isNaN(v))) {
                    if (window.notify) window.notify('ENTER ALL SENSITIVITY VALUES', 'error');
                    return;
                }
                
                let keys = [];
                for(let i=0; i<bulkAmount; i++) {
                    const res = await api(`${API_BASE}/vendor/manual-entry`, 'POST', body);
                    keys.push(res.accessKey);
                }
                
                toggleSheet(false);
                document.getElementById('genResult').classList.remove('hidden');
                document.getElementById('accessKeyVal').innerHTML = keys.join('<br>');
                if (window.notify) window.notify(`PUBLISHED ${keys.length} KEY(S)`, 'success');
            } catch (e) {
                if (window.notify) window.notify(e.message || 'MANUAL_PUBLISH_FAILED', 'error');
            }
        }

        function copyCode() {
            const code = document.getElementById('accessKeyVal').textContent;
            navigator.clipboard.writeText(code);
            if (window.notify) window.notify('COPIED_TO_CLIPBOARD', 'success');
        }

        function handleLogout() {
            document.cookie = 'xp_vendor_token=; Max-Age=0; path=/;';
            window.location.href = '/verify.html';
        }

        setTimeout(populateBrands, 500); // Wait for devices.js
        init();
    </script>
</body>
</html>
