<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XP ARENA | MASTER COMMAND</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta name="theme-color" content="#020617">
    <style>
        .admin-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: var(--space-lg);
        }
        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            text-align: center;
        }
        .stat-num {
            display: block;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-primary);
            font-family: var(--font-heading);
        }
        .vendor-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            margin-bottom: 0.75rem;
        }
        .vendor-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }
        .btn-stack {
            display: flex;
            gap: 0.5rem;
        }
        .mini-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
        }
        .mini-btn.danger { color: #ff4444; border-color: rgba(255, 68, 68, 0.2); }
        
        /* Modal Overrides */
        .modal-root {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 3000;
            padding: var(--space-md);
            overflow-y: auto;
            display: none;
        }

        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .live-feed-item {
            font-size: 0.65rem;
            font-family: var(--font-mono);
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <!-- Security Gate -->
    <div id="privateGate" class="vault-root">
        <div class="reveal" style="text-align: center;">
            <div class="logo-badge">SYSTEM OVERRIDE</div>
            <h1 class="title-main" style="font-size: 2.2rem;">MASTER<br>AUTHENTICATION</h1>
            <div class="vault-input-wrap">
                <input type="password" id="adminPass" class="vault-input-field" placeholder="••••••••" maxlength="32" autofocus>
            </div>
            <p id="gateStatus" style="font-size: 0.7rem; color: var(--text-muted); margin-top: 1rem; font-family: var(--font-mono); height: 1.2rem;"></p>
            <button class="action-btn" onclick="checkPass()">ACCESS ENGINE</button>
        </div>
    </div>

    <!-- Main Panel -->
    <div id="mainPanel" class="app-container hidden">
        <header class="admin-nav">
            <div>
                <div class="logo-badge" style="display: flex; align-items: center;">
                    <span class="pulse"></span> LIVE_ACTIVE
                </div>
                <h1 class="title-main" style="font-size: 1.5rem; margin: 0.5rem 0;">COMMAND CENTER</h1>
            </div>
            <button class="mini-btn danger" onclick="logoutAdmin()">EXIT</button>
        </header>

        <section class="stat-grid">
            <div class="stat-box">
                <span class="stat-num" id="totalVendors">0</span>
                <span class="form-label">VENDORS</span>
            </div>
            <div class="stat-box">
                <span class="stat-num" id="totalUsage">0</span>
                <span class="form-label">SESSIONS</span>
            </div>
            <div class="stat-box" style="grid-column: span 2; background: rgba(34, 197, 94, 0.05); border-color: rgba(34, 197, 94, 0.2);">
                <span class="stat-num" id="globalAccuracy" style="color: #22c55e;">0.0</span>
                <span class="form-label">NEURAL ACCURACY (%)</span>
            </div>
        </section>

        <section class="glass-card">
            <label class="form-label">Register New Provider</label>
            <input type="text" id="vendorId" class="cyber-input" placeholder="VENDOR IDENTITY (e.g. SKY-NET)" style="margin-bottom: 0.75rem;">
            <button class="action-btn" onclick="addVendor()">PROVISION ACCESS KEY</button>
        </section>

        <section style="margin-top: 2rem;">
            <label class="form-label">Real-time Activity Stream</label>
            <div id="liveFeed" class="glass-card" style="padding: 0.5rem; min-height: 100px; max-height: 200px; overflow-y: hidden; background: rgba(0,0,0,0.2);">
                <div style="text-align: center; opacity: 0.2; padding: 2rem; font-size: 0.6rem;">WAITING_FOR_UPLINK...</div>
            </div>
        </section>

        <section style="margin-top: 2rem;">
            <label class="form-label">Authorized Providers</label>
            <div id="vendorList">
                <div style="text-align: center; opacity: 0.3; padding: 2rem;">INITIALIZING_DATA_STREAM...</div>
            </div>
        </section>

        <footer style="margin-top: 3rem; text-align: center; opacity: 0.5; padding-bottom: 2rem;">
            <p style="font-size: 0.6rem; letter-spacing: 0.1em; font-weight: 800;">XP ARENA SECURITY CORE V2.4</p>
        </footer>
    </div>

    <!-- Analytics Modal -->
    <div id="analyticsModal" class="modal-root">
        <div class="admin-nav">
            <h2 class="title-main" id="modalTitle" style="font-size: 1.5rem;">ACTIVITY LOGS</h2>
            <button class="mini-btn" onclick="closeModal()">CLOSE</button>
        </div>
        
        <div class="stat-grid">
            <div class="stat-box"><span class="stat-num" id="vCodes">0</span><span class="form-label">GENS</span></div>
            <div class="stat-box"><span class="stat-num" id="vUsage">0</span><span class="form-label">HITS</span></div>
        </div>

        <div class="glass-card" style="padding: 0; overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; font-size: 0.75rem;">
                <thead>
                    <tr style="text-align: left; border-bottom: 1px solid var(--border-light);">
                        <th style="padding: 1rem;">TIME</th>
                        <th style="padding: 1rem;">IDENTITY</th>
                        <th style="padding: 1rem;">CONFIG</th>
                    </tr>
                </thead>
                <tbody id="activityBody"></tbody>
            </table>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="notifications.js"></script>
    <script>
        // Neural Content Decryption
        const socket = io();

        socket.on('live_event', (data) => {
            if (data.type === 'verify') {
                if (window.notify) window.notify(`LIVE_HIT: ${data.user_ign}`, 'success');
                
                const feed = document.getElementById('liveFeed');
                const item = document.createElement('div');
                item.className = 'live-feed-item';
                item.innerHTML = `<span style="color:var(--accent-primary)">[${new Date().toLocaleTimeString()}]</span> ${data.user_ign} calibrated ${data.device}`;
                
                if (feed.children[0] && feed.children[0].textContent.includes('WAITING')) feed.innerHTML = '';
                feed.prepend(item);
                if (feed.children.length > 5) feed.removeChild(feed.lastChild);

                loadDashboard(); // Refresh stats
            }

            if (data.type === 'feedback') {
                const feed = document.getElementById('liveFeed');
                const item = document.createElement('div');
                item.className = 'live-feed-item';
                item.style.borderLeft = '2px solid #22c55e';
                item.innerHTML = `<span style="color:#22c55e">[FEEDBACK]</span> ${'★'.repeat(data.rating)} - "${data.feedback}"`;
                
                if (feed.children[0] && feed.children[0].textContent.includes('WAITING')) feed.innerHTML = '';
                feed.prepend(item);
                if (feed.children.length > 5) feed.removeChild(feed.lastChild);
                loadDashboard();
            }
        });

        async function api(path, method = 'GET', body = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include'
            };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(path, options);
            if (res.status === 401) {
                logoutAdmin();
                return null;
            }
            if (!res.ok) throw new Error((await res.json()).error || 'API_ERR');
            return res.json();
        }

        async function checkPass() {
            const pass = document.getElementById('adminPass').value;
            const status = document.getElementById('gateStatus');
            try {
                status.textContent = 'AUTHENTICATING...';
                const res = await fetch('/api/vault/admin/login', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass }),
                    credentials: 'include'
                });
                if (res.ok) {
                    document.getElementById('privateGate').classList.add('hidden');
                    document.getElementById('mainPanel').classList.remove('hidden');
                    loadDashboard();
                } else {
                    status.textContent = 'ACCESS_DENIED';
                }
            } catch (e) {
                status.textContent = 'SYSTEM_FAILURE';
            }
        }

        function logoutAdmin() {
            document.getElementById('mainPanel').classList.add('hidden');
            document.getElementById('privateGate').classList.remove('hidden');
            document.getElementById('adminPass').value = '';
        }

        async function loadDashboard() {
            try {
                const stats = await api('/api/vault/admin/stats');
                document.getElementById('totalVendors').textContent = stats.vendors;
                document.getElementById('totalUsage').textContent = stats.usage_total;
                document.getElementById('globalAccuracy').textContent = stats.global_accuracy ? (stats.global_accuracy * 20).toFixed(1) + '%' : '100%';

                const vendors = await api('/api/vault/admin/vendors');
                document.getElementById('vendorList').innerHTML = vendors.map(v => `
                    <div class="vendor-card">
                        <div>
                            <div style="font-weight: 800; font-size: 0.9rem;">${v.vendor_id}</div>
                            <div class="vendor-meta">${v.access_key}</div>
                        </div>
                        <div class="btn-stack">
                            <button class="mini-btn" onclick="showAnalytics('${v.vendor_id}', ${v.total_codes}, ${v.total_usage})">LOGS</button>
                            <button class="mini-btn danger" onclick="deleteVendor('${v.vendor_id}')">X</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {}
        }

        async function addVendor() {
            const vid = document.getElementById('vendorId').value;
            if (!vid) return alert("IDENTITY_REQUIRED");
            try {
                const res = await api('/api/vault/admin/vendors', 'POST', { vendorId: vid });
                alert(`PROVISIONED: ${res.accessKey}`);
                document.getElementById('vendorId').value = '';
                loadDashboard();
            } catch (e) { alert(e.message); }
        }

        async function deleteVendor(id) {
            if (!confirm(`ERASE ${id}?`)) return;
            await api(`/api/vault/admin/vendor/${id}`, 'DELETE');
            loadDashboard();
        }

        async function showAnalytics(id, codes, usage) {
            document.getElementById('analyticsModal').style.display = 'block';
            document.getElementById('modalTitle').textContent = id;
            document.getElementById('vCodes').textContent = codes;
            document.getElementById('vUsage').textContent = usage;
            const body = document.getElementById('activityBody');
            body.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 2rem; opacity: 0.3;">DECRYPTION_IN_PROGRESS...</td></tr>';
            try {
                const logs = await api(`/api/vault/admin/vendor/${id}/analytics`);
                body.innerHTML = logs.map(l => {
                    const res = typeof l.results_json === 'string' ? JSON.parse(l.results_json) : l.results_json;
                    return `<tr style="border-bottom: 1px solid rgba(255,255,255,0.02);">
                        <td style="padding: 0.75rem;">${new Date(l.used_at).toLocaleTimeString()}</td>
                        <td style="padding: 0.75rem;">${l.user_ign}</td>
                        <td style="padding: 0.75rem; font-family:var(--font-mono); font-size: 0.6rem;">${res.brand} ${res.model}</td>
                    </tr>`;
                }).join('');
            } catch (e) {}
        }

        function closeModal() { document.getElementById('analyticsModal').style.display = 'none'; }
    </script>
</body>
</html>
