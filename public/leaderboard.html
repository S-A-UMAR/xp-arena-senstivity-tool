<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>AXP | Top Vendors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-primary: #00f0ff;
            --accent-secondary: #7000ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding-top: 100px;
            padding-bottom: 100px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(112, 0, 255, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 80px;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(32px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            z-index: 5000;
        }

        .header-title { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.02em; }
        .header-logo { color: var(--accent-primary); font-weight: 900; letter-spacing: 0.2em; font-size: 0.8rem; text-decoration: none; }

        .user-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 85px;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(32px);
            border-top: 1px solid var(--glass-border);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--accent-primary); }
        .nav-item svg { width: 22px; height: 22px; }
        .nav-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.05em; }

        .container { max-width: 600px; margin: 0 auto; padding: 0 1.25rem; }
        
        .vendor-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: 0.4s;
            text-decoration: none;
            color: inherit;
        }
        .vendor-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
        }

        .rank {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--accent-primary);
            width: 40px;
            text-align: center;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .info { flex: 1; }
        .name { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.2rem; display: block; }
        .meta { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

        .stats { text-align: right; }
        .hits { font-size: 1.1rem; font-weight: 900; color: white; display: block; }
        .hits-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="header-logo">AXP PRECISION</a>
        <div class="header-title">TOP VENDORS</div>
        <div style="width: 80px;"></div> <!-- Spacer -->
    </header>

    <div class="container">
        <div id="vendorList">
            <!-- Loading State -->
            <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
                <div class="spinner"></div>
                <p style="margin-top: 1rem; font-size: 0.8rem; letter-spacing: 0.1em;">SYNCING_VENDORS...</p>
            </div>
        </div>
    </div>

    <nav class="user-nav">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="nav-label">HOME</span>
        </a>
        <a href="events.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 10.63 21 8.55 21 8V7c0-1.1-.9-2-2-2zM7 10.82C5.84 10.4 5 9.3 5 8V7h2v3.82zM19 8c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
            <span class="nav-label">SCRIMS</span>
        </a>
        <a href="winners.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span class="nav-label">WINNERS</span>
        </a>
        <a href="elite.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span class="nav-label">ELITE</span>
        </a>
    </nav>

    <script src="translations.js"></script>
    <script>
        async function loadVendors() {
            if (window.applyLanguage) window.applyLanguage();
            try {
                // Mocking data for now, ideally fetch from /api/leaderboard
                const vendors = [
                    { name: 'EliteSensi', hits: '42.5K', status: 'VERIFIED', icon: '⚡' },
                    { name: 'ProCalibrate', hits: '31.2K', status: 'PARTNER', icon: '🎯' },
                    { name: 'MobileKing', hits: '28.9K', status: 'VERIFIED', icon: '👑' },
                    { name: 'AlphaGuides', hits: '15.4K', status: 'VERIFIED', icon: '🐺' },
                    { name: 'GhostTarget', hits: '12.8K', status: 'PARTNER', icon: '👻' }
                ];

                const list = document.getElementById('vendorList');
                list.innerHTML = vendors.map((v, i) => `
                    <a href="#" class="vendor-card">
                        <div class="rank">#${i + 1}</div>
                        <div class="avatar">${v.icon}</div>
                        <div class="info">
                            <span class="name">${v.name}</span>
                            <span class="meta">${v.status}</span>
                        </div>
                        <div class="stats">
                            <span class="hits">${v.hits}</span>
                            <span class="hits-label">Calibrations</span>
                        </div>
                    </a>
                `).join('');
            } catch (err) {
                console.error('Failed to load vendors');
            }
        }
        document.addEventListener('DOMContentLoaded', loadVendors);
    </script>
</body>
</html>
