<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>AXP HUB | Precision Mobile Calibration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg-deep: #020617;
            --accent-primary: #00f0ff;
            --accent-secondary: #7000ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(112, 0, 255, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }

        .landing-shell { width: 100%; max-width: 500px; text-align: center; }

        .brand-hero { margin-bottom: 4rem; animation: fadeInDown 0.8s ease-out; }
        .brand-logo { font-size: 0.9rem; font-weight: 900; letter-spacing: 0.4em; color: var(--accent-primary); margin-bottom: 1.5rem; }
        .brand-title { font-size: 3.5rem; font-weight: 800; line-height: 0.9; letter-spacing: -0.04em; margin-bottom: 1.5rem; }
        .brand-tagline { font-size: 1rem; color: var(--text-muted); opacity: 0.8; max-width: 400px; margin: 0 auto; line-height: 1.6; }

        .main-action {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            background: var(--accent-primary);
            color: black;
            text-decoration: none;
            padding: 1.25rem 2.5rem;
            border-radius: 100px;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 3rem;
        }
        .main-action:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.5);
        }

        .quick-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            width: 100%;
            margin-top: 2rem;
            padding: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
        }
        .stat-item .val { font-size: 1.5rem; font-weight: 800; color: white; display: block; }
        .stat-item .label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }

        .user-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 85px;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(32px);
            border-top: 1px solid var(--glass-border);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--accent-primary); }
        .nav-item svg { width: 22px; height: 22px; }
        .nav-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.05em; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="landing-shell">
        <div class="brand-hero">
            <div class="brand-logo">AXP PRECISION</div>
            <h1 class="brand-title">THE NEURAL<br>ENGINE</h1>
            <p class="brand-tagline">Elite hardware calibration for pro-grade mobile gaming performance.</p>
        </div>

        <a href="generator.html" class="main-action">
            OPEN CALIBRATOR
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>

        <div class="quick-stats">
            <div class="stat-item">
                <span class="val">2.4M</span>
                <span class="label">Profiles</span>
            </div>
            <div class="stat-item">
                <span class="val">99.8%</span>
                <span class="label">Accuracy</span>
            </div>
            <div class="stat-item">
                <span class="val">142</span>
                <span class="label">Countries</span>
            </div>
        </div>
    </div>

    <nav class="user-nav">
        <a href="index.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="nav-label">HOME</span>
        </a>
        <a href="events.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 10.63 21 8.55 21 8V7c0-1.1-.9-2-2-2zM7 10.82C5.84 10.4 5 9.3 5 8V7h2v3.82zM19 8c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
            <span class="nav-label">SCRIMS</span>
        </a>
        <a href="winners.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span class="nav-label">WINNERS</span>
        </a>
        <a href="elite.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span class="nav-label">ELITE</span>
        </a>
    </nav>

    <script src="translations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.applyLanguage) window.applyLanguage();
        });
    </script>
    <script src="settings.js"></script>
</body>
</html>
