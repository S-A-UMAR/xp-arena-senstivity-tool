<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XP ARENA | AI NEURAL SENSITIVITY</title>
    <meta name="description" content="Elite hardware-optimized sensitivity benchmarks for mobile shooters. Powered by the Neural Engine V4.">
    
    <!-- 🔓 Open Graph / Viral Meta (10/10 SEO) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://xparena.pro/">
    <meta property="og:title" content="XP ARENA | AI NEURAL CALIBRATION">
    <meta property="og:description" content="Get professional mobile sensitivity settings calibrated to your exact device architecture and grip style.">
    <meta property="og:image" content="https://xparena.pro/icons/og-preview.png">

    <!-- 🐦 Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="XP ARENA | NEURAL ENGINE">
    <meta name="twitter:description" content="Elite sensitivity guides for pro mobile players. 60FPS precision engineering.">
    <meta name="twitter:image" content="https://xparena.pro/icons/og-preview.png">

    <!-- 💎 Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "XP ARENA NEURAL VAULT",
      "operatingSystem": "iOS, Android, Windows",
      "applicationCategory": "UtilitiesApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="ambient-glow"></div>

    <!-- The Vault (Secure Access) -->
    <div id="vaultOverlay" class="vault-root">
        <div class="reveal" style="text-align: center;">
            <div class="logo-badge">XP SECURE CORE</div>
            <h1 class="title-main" style="font-size: 2.2rem;">CALIBRATION<br>REQUIRED</h1>
            
            <div class="vault-input-wrap">
                <input type="text" id="vaultInput" class="vault-input-field" placeholder="000 - 000" maxlength="20" autofocus autocomplete="off">
            </div>
            
            <p id="vaultStatus" style="font-size: 0.7rem; color: var(--text-muted); margin-top: 1rem; font-family: var(--font-mono); height: 1.2rem;"></p>
        </div>
        
        <div style="position: fixed; bottom: 2rem; opacity: 0.3; font-size: 0.6rem; letter-spacing: 0.2em; font-weight: 800;">
            ENCRYPTED LINK AUTHENTICATION ACTIVE
        </div>
    </div>

    <!-- Main Calibration UI -->
    <div id="appContainer" class="app-container hidden">
        <header style="text-align: center; margin-bottom: var(--space-lg); position: relative;">
            <button id="pwaInstallBtn" class="logo-badge" style="display: none; border-color: var(--accent-primary); color: var(--accent-primary); cursor: pointer; margin-bottom: 1rem; position: absolute; right: 0; top: 0; font-size: 0.6rem;">INSTALL APP</button>
            <div class="logo-badge">SYSTEM ENGINE V4.0</div>
            <h1 class="title-main">NEURAL<br>CALIBRATION</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Optimizing benchmarks for your specific hardware architecture.</p>
        </header>

        <main>
            <!-- Device Profiling -->
            <section class="glass-card reveal">
                <div class="form-group">
                    <label class="form-label">Hardware Signature</label>
                    <div class="select-container">
                        <select id="brandSelect" class="cyber-select">
                            <option value="">SELECT BRAND</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <div class="select-container">
                        <select id="seriesSelect" class="cyber-select" disabled>
                            <option value="">SELECT SERIES</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <div class="select-container">
                        <select id="modelSelect" class="cyber-select" disabled>
                            <option value="">SELECT MODEL</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Biometric / Grip Profile -->
            <section class="glass-card reveal" style="animation-delay: 0.1s;">
                <div class="slider-group">
                    <div class="slider-header">
                        <label class="form-label">Neural Sensitivity</label>
                        <span class="slider-value" id="sensLabel">5.0</span>
                    </div>
                    <input type="range" id="sensInput" min="1" max="10" step="0.5" value="5" class="cyber-slider">
                    <p style="font-size: 0.65rem; color: var(--text-muted); margin-top: 0.4rem;">AI will adjust base calculations by this factor.</p>
                </div>

                <div class="form-group">
                    <label class="form-label">Grip Architecture</label>
                    <div class="segment-group">
                        <button class="segment-btn active" data-grip="palm">PALM</button>
                        <button class="segment-btn" data-grip="claw">CLAW</button>
                        <button class="segment-btn" data-grip="tip">TIP</button>
                    </div>
                </div>
            </section>

            <!-- Manual Overrides (Requested by User) -->
            <section class="glass-card reveal" style="animation-delay: 0.2s;">
                <label class="form-label" style="display: flex; justify-content: space-between;">
                    Manual Override <span>(OPTIONAL)</span>
                </label>
                <input type="text" id="manualSens" class="cyber-input" placeholder="PASTE EXISTING VALUE OR LEAVE BLANK">
            </section>

            <button id="calculateBtn" class="action-btn reveal" style="animation-delay: 0.3s;">
                GENERATE OPTIMIZED GUIDE
            </button>
        </main>

        <footer style="margin-top: var(--space-xl); text-align: center; opacity: 0.5; padding-bottom: 2rem; font-family: var(--font-mono); font-size: 0.6rem;">
            <div style="margin-bottom: 1rem;">
                <button onclick="toggleLowPerf()" id="perfBtn" class="logo-badge" style="background: rgba(255,255,255,0.05); color: var(--text-muted); cursor: pointer; border-color: rgba(255,255,255,0.1);">
                    MODE: FULL_NEURAL
                </button>
            </div>
            <div style="display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.5rem; font-weight: 800; letter-spacing: 0.05em;">
                <a href="#" onclick="UI.notify('PRIVACY_POLICY_ENCRYPTED', 'info')" style="color: inherit; text-decoration: none;">PRIVACY</a>
                <a href="#" onclick="UI.notify('TERMS_OF_SERVICE_ACKNOWLEDGED', 'info')" style="color: inherit; text-decoration: none;">TERMS</a>
                <a href="#" onclick="UI.notify('NEURAL_SUPPORT_LINK_ACTIVE', 'info')" style="color: var(--accent-primary); text-decoration: none;">SUPPORT</a>
            </div>
            <p style="letter-spacing: 0.1em; font-weight: 800;">POWERED BY XP ARENA GLOBAL CLOUD</p>
        </footer>
    </div>

    <!-- Notification Toast -->
    <div id="notifyToast" class="notify-toast"></div>

    <script src="devices.js"></script>
    <script src="calculator.js"></script>
    <script src="analytics.js"></script>
    <script src="app.js"></script>
</body>
</html>
