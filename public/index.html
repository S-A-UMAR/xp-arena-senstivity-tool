<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AXP HUB | NEURAL ENGINE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: var(--bg-deep, #05070a);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.25rem;
            margin: 0;
            box-sizing: border-box;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(0, 255, 204, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 242, 254, 0.05) 0%, transparent 40%);
        }
        .portal-glass {
            background: rgba(15, 20, 25, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 32px;
            padding: 3rem 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,255,204,0.05);
            animation: fadeIn 0.8s ease-out;
        }
        .brand-logo {
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            color: var(--accent-primary, #00ffcc);
            margin-bottom: 1rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.1;
            margin: 0 0 1rem;
            background: linear-gradient(to right, #fff, var(--text-muted, #94a3b8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted, #94a3b8);
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .cyber-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.25rem;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }
        .cyber-input:focus {
            border-color: var(--accent-primary, #00ffcc);
            background: rgba(0, 255, 204, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        .btn-primary {
            width: 100%;
            background: var(--accent-primary, #00ffcc);
            color: #05070a;
            border: none;
            padding: 1.25rem;
            border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0,255,204,0.3);
        }
        .btn-primary:focus {
             outline: 2px solid white;
             outline-offset: 4px;
        }
        .btn-primary:active {
            transform: translateY(2px);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="portal-glass">
        <div class="brand-logo">AXP HUB</div>
        <h1 class="title">NEURAL CALIBRATION PORTAL</h1>
        <p class="subtitle">Enter your secure Access Key to decrypt and deploy your device-specific Free Fire sensitivity profile.</p>
        
        <form action="result.html" method="GET" id="accessForm">
            <input type="text" name="code" class="cyber-input" placeholder="e.g. AXP-X82-K9" required autocomplete="off" spellcheck="false" id="codeInput">
            <button type="submit" class="btn-primary" id="decryptBtn">DECRYPT & VIEW</button>
        </form>
    </div>
    
    <script>
        document.getElementById('accessForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('decryptBtn');
            btn.textContent = 'DECRYPTING...';
            btn.style.opacity = '0.7';
        });
    </script>
</body>
</html>
