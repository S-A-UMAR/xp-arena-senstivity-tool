<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>AXP | ELITE COMMAND</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor_shared.css">
    <link rel="stylesheet" href="vendor_nav.css">
    <style>
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: var(--glass-bg);
            border: 1px solid var(--accent-primary);
            border-radius: 24px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 0 30px var(--accent-primary-glow);
        }
        .profile-name { font-size: 1.5rem; font-weight: 800; color: white; }
        .profile-status { font-size: 0.65rem; color: var(--accent-primary); font-weight: 800; letter-spacing: 0.1em; }

        .settings-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .settings-item:hover { border-color: var(--accent-primary); background: rgba(255, 255, 255, 0.05); }
        .settings-icon { font-size: 1.2rem; }
        .settings-text { flex: 1; }
        .settings-title { font-size: 0.9rem; font-weight: 800; color: white; }
        .settings-desc { font-size: 0.6rem; color: var(--text-muted); margin-top: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <div class="profile-avatar">👤</div>
            <h1 class="profile-name" id="vendorName">Elite Creator</h1>
            <p class="profile-status">AXP VERIFIED PARTNER</p>
        </div>

        <div class="glass-panel">
            <h2 class="section-title">COMMAND_CENTER</h2>
            
            <div class="settings-item">
                <span class="settings-icon">🎨</span>
                <div class="settings-text">
                    <div class="settings-title">PRO_BRANDING</div>
                    <div class="settings-desc">Update your logo, links, and display name.</div>
                </div>
            </div>

            <div class="settings-item">
                <span class="settings-icon">🔑</span>
                <div class="settings-text">
                    <div class="settings-title">VAULT_ACCESS</div>
                    <div class="settings-desc">Manage and revoke active access keys.</div>
                </div>
            </div>

            <div class="settings-item">
                <span class="settings-icon">📦</span>
                <div class="settings-text">
                    <div class="settings-title">MASTER_PRESETS</div>
                    <div class="settings-desc">Quick-load your saved configurations.</div>
                </div>
            </div>
        </div>

        <div class="glass-panel" style="background: rgba(255, 68, 68, 0.05); border-color: rgba(255, 68, 68, 0.2);">
            <button class="btn-primary" style="background: transparent; color: #ff6b6b; box-shadow: none; border: 1px solid rgba(255, 68, 68, 0.3);" onclick="handleLogout()">LOGOUT_SESSION</button>
        </div>
    </div>

    <script src="vendor_layout.js"></script>
    <script src="vendor_logic.js"></script>
</body>
</html>
