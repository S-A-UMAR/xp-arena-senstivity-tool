<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>AXP | VENDOR PROFILE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor_shared.css">
    <link rel="stylesheet" href="vendor_nav.css">
    <style>
        .profile-container {
            padding-bottom: 120px;
        }
        
        /* Hero Banner */
        .profile-hero {
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.1), rgba(0, 0, 0, 0));
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            padding: 2.5rem 1.5rem;
            text-align: center;
            border-radius: 0 0 32px 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
        }
        .profile-avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
        }
        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 30px;
            background: var(--glass-bg);
            border: 2px solid var(--accent-primary);
            box-shadow: 0 0 25px var(--accent-primary-glow);
            object-fit: cover;
        }
        .tier-badge {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-deep, #05070a);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.1em;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }
        .profile-name {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 0.5rem;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .profile-id {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }

        /* Settings Grid */
        .settings-grid {
            display: grid;
            gap: 1.25rem;
            padding: 0 1.25rem;
        }

        .settings-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            transition: 0.3s;
        }
        .settings-card:active {
            transform: scale(0.98);
        }
        
        .settings-card-header {
            padding: 1.25rem 1.25rem 0.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid transparent;
        }
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(0,255,204,0.1);
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1px solid rgba(0,255,204,0.2);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: white;
        }
        .card-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .settings-card-body {
            padding: 1rem 1.25rem 1.5rem;
        }
        
        .c-input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .c-input:focus {
            border-color: var(--accent-primary);
            background: rgba(0,255,204,0.05);
        }
        
        .action-row {
            display: flex;
            gap: 10px;
        }
        .btn-update {
            flex: 1;
            background: var(--accent-primary);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        /* Danger Zone */
        .danger-zone {
            margin: 2rem 1.25rem;
            background: rgba(255, 68, 68, 0.05);
            border: 1px dashed rgba(255, 68, 68, 0.3);
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
        }
        .danger-title {
            color: #ff4444;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .btn-danger {
            background: transparent;
            color: #ff4444;
            border: 1px solid rgba(255,68,68,0.3);
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
        }
        .btn-danger:active {
            background: rgba(255,68,68,0.1);
        }

        @media (max-width: 480px) {
            .profile-hero {
                padding: 3rem 1rem 2rem;
                border-radius: 0 0 24px 24px;
            }
        }
    </style>
</head>
<body class="vendor-shell">
    <div class="profile-container">
        <!-- Hero Section -->
        <header class="profile-hero">
            <div class="profile-avatar-wrapper">
                <img src="favicon.png" alt="Vendor Avatar" class="profile-avatar" id="vendorAvatar">
                <div class="tier-badge" id="vendorTierBadge">PREMIUM</div>
            </div>
            <h1 class="profile-name" id="vendorName">AXP VENDOR</h1>
            <div class="profile-id" id="vendorIdDisplay">ID: VEND-0000</div>
        </header>

        <main class="settings-grid">
            <!-- Brand Config -->
            <section class="settings-card">
                <div class="settings-card-header">
                    <div class="card-icon">🎨</div>
                    <div>
                        <div class="card-title">Profile Identity</div>
                        <div class="card-subtitle">Update your display branding</div>
                    </div>
                </div>
                <div class="settings-card-body">
                    <input type="text" id="brandNameInput" class="c-input" placeholder="Display Name">
                    <input type="text" id="brandLogoInput" class="c-input" placeholder="Logo Image URL">
                    <button class="btn-update" onclick="updateBranding()">SAVE IDENTITY</button>
                </div>
            </section>

            <!-- API Access / Vault -->
            <section class="settings-card" style="border-color: rgba(0, 255, 204, 0.3);">
                <div class="settings-card-header">
                    <div class="card-icon" style="color: #fff; background: #000; border-color: #333;">🔑</div>
                    <div>
                        <div class="card-title">Vault Security</div>
                        <div class="card-subtitle">Manage access capabilities</div>
                    </div>
                </div>
                <div class="settings-card-body">
                    <div style="background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 12px; text-align: center; margin-bottom: 1rem; border: 1px solid #333;">
                        <div style="font-size: 0.65rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 4px;">CURRENT SUBSCRIPTION</div>
                        <div id="subValidUntil" style="font-weight: 800; font-size: 1.1rem; color: var(--accent-primary);">ACTIVE</div>
                    </div>
                </div>
            </section>
        </main>

        <section class="danger-zone">
            <div class="danger-title">SESSION CONTROL</div>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1.5rem;">Securely end your current session to prevent unauthorized code generation.</p>
            <button class="btn-danger" onclick="logoutVendor()">SIGN OUT</button>
        </section>
    </div>

    <!-- Inject Bottom Navigation -->
    <script src="vendor_layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const token = localStorage.getItem('axp_vendor_token');
                if (!token) {
                    window.location.href = 'index.html';
                    return;
                }

                const res = await fetch('/api/vault/vendor/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401) {
                    localStorage.removeItem('axp_vendor_token');
                    window.location.href = 'index.html';
                    return;
                }

                const data = await res.json();
                
                // Tier styling apply
                if(data.tier === 'premium') {
                    document.documentElement.style.setProperty('--accent-primary', '#00f2fe');
                    document.documentElement.style.setProperty('--accent-primary-glow', 'rgba(0, 242, 254, 0.4)');
                } else if(data.tier === 'gold') {
                    document.documentElement.style.setProperty('--accent-primary', '#ffd700');
                    document.documentElement.style.setProperty('--accent-primary-glow', 'rgba(255, 215, 0, 0.4)');
                } else {
                    document.documentElement.style.setProperty('--accent-primary', '#00ffcc');
                    document.documentElement.style.setProperty('--accent-primary-glow', 'rgba(0, 255, 204, 0.4)');
                }

                document.getElementById('vendorName').textContent = data.display_name;
                document.getElementById('brandNameInput').value = data.display_name;
                document.getElementById('brandLogoInput').value = data.brand_config?.logo_url || '';
                if(data.brand_config?.logo_url) {
                    document.getElementById('vendorAvatar').src = data.brand_config.logo_url;
                }
                
                document.getElementById('vendorTierBadge').textContent = data.tier.toUpperCase() + ' VENDOR';
                document.getElementById('vendorIdDisplay').textContent = `ID: ${data.vendor_id}`;
                
                if(data.active_until) {
                    document.getElementById('subValidUntil').textContent = `EXPIRES: ${new Date(data.active_until).toLocaleDateString()}`;
                } else {
                    document.getElementById('subValidUntil').textContent = `PERMANENT ACCESS`;
                }

            } catch(e) {
                console.error(e);
            }
        });

        async function updateBranding() {
            const btn = document.querySelector('.btn-update');
            const originalText = btn.textContent;
            btn.textContent = 'SAVING...';
            btn.style.opacity = '0.7';

            try {
                const token = localStorage.getItem('axp_vendor_token');
                if(!token) return;

                const name = document.getElementById('brandNameInput').value;
                const logo = document.getElementById('brandLogoInput').value;

                await fetch('/api/vault/vendor/branding', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ display_name: name, logo_url: logo })
                });

                document.getElementById('vendorName').textContent = name || 'AXP VENDOR';
                if(logo) {
                    document.getElementById('vendorAvatar').src = logo;
                }
            } catch(e) {
                console.error(e);
            } finally {
                btn.textContent = 'SAVED ✓';
                btn.style.opacity = '1';
                setTimeout(() => { btn.textContent = originalText; }, 2000);
            }
        }

        function logoutVendor() {
            localStorage.removeItem('axp_vendor_token');
            document.cookie = 'xp_vendor_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
