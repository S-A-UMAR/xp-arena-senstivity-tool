<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>AXP | GIVEAWAY HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="vendor_shared.css">
    <link rel="stylesheet" href="vendor_nav.css">
</head>
<body>
    <div class="container">
        <!-- 💠 Elite Giveaway Panel -->
        <div class="glass-panel" style="background: linear-gradient(145deg, rgba(0, 255, 204, 0.1), rgba(0, 242, 254, 0.05)); border-color: rgba(0, 255, 204, 0.2);">
            <div class="section-header">
                <div>
                    <span class="badge-pro">PRO_REWARDS</span>
                    <h2 class="section-title" style="margin-top: 0.5rem;">GIVEAWAY_HUB</h2>
                </div>
                <button class="btn-primary" style="padding: 0.75rem 1.5rem; width: auto; font-size: 0.8rem;" onclick="VendorLogic.createEvent('giveaway')">+ NEW_GIFT</button>
            </div>
            <p style="font-size: 0.75rem; color: var(--text-muted); line-height: 1.6; margin-top: 1rem;">Reward your community with automated draws and secure reward distribution.</p>
        </div>

        <div id="giveawayList">
            <div class="command-tile" onclick="VendorLogic.pickWinner('gift_1')">
                <div class="command-icon" style="background: rgba(0, 255, 204, 0.1); color: var(--accent-primary);">🎁</div>
                <div class="command-info">
                    <h3>1000 DIAMONDS MEGA</h3>
                    <p>TYPE: REDEEM_CODE · ENTRIES: 1,420 · LIVE</p>
                </div>
            </div>
            
            <div class="command-tile" onclick="VendorLogic.pickWinner('gift_2')">
                <div class="command-icon" style="background: rgba(0, 255, 204, 0.1); color: var(--accent-primary);">🎁</div>
                <div class="command-info">
                    <h3>ELITE SKIN PACK</h3>
                    <p>TYPE: GIFTING · ENTRIES: 850 · ENDED</p>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor_layout.js"></script>
    <script src="vendor_logic.js"></script>
</body>
</html>
